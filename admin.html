<!-- admin.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Developer Portal | SUXY</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --deep-black: #020202;
            --terminal-bg: #0a0a0f;
            --elevated: #15151a;
            --gold: #c9a961;
            --gold-dim: #8b7355;
            --red: #ff4444;
            --green: #00ff88;
            --blue: #4facfe;
            --gray: #6c6c6c;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--deep-black);
            color: #e0e0e0;
            line-height: 1.6;
        }

        /* Login Screen - Terminal Style */
        .login-screen {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: 
                radial-gradient(circle at 50% 50%, rgba(201,169,97,0.05) 0%, transparent 70%),
                var(--terminal-bg);
            position: relative;
            overflow: hidden;
        }

        .login-screen::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 2px,
                    rgba(0,255,0,0.03) 2px,
                    rgba(0,255,0,0.03) 4px
                );
            pointer-events: none;
        }

        .terminal-box {
            background: rgba(10,10,15,0.95);
            border: 1px solid rgba(201,169,97,0.2);
            border-radius: 8px;
            padding: 3rem;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.8);
            position: relative;
        }

        .terminal-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .terminal-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .dot-red { background: var(--red); }
        .dot-yellow { background: #ffb800; }
        .dot-green { background: var(--green); }

        .terminal-title {
            margin-left: auto;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            color: var(--gray);
            text-transform: uppercase;
        }

        .terminal-box h2 {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.2rem;
            color: var(--gold);
            margin-bottom: 2rem;
            font-weight: 400;
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        .input-group label {
            display: block;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: var(--gray);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .terminal-input {
            width: 100%;
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 1rem;
            color: var(--green);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            border-radius: 4px;
            transition: all 0.3s;
        }

        .terminal-input:focus {
            outline: none;
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(201,169,97,0.1);
        }

        .terminal-btn {
            width: 100%;
            padding: 1rem;
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 1rem;
            border-radius: 4px;
        }

        .terminal-btn:hover {
            background: var(--gold);
            color: var(--deep-black);
            box-shadow: 0 0 20px rgba(201,169,97,0.3);
        }

        .error-msg {
            color: var(--red);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            margin-top: 1rem;
            display: none;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 2rem;
            color: var(--gray);
            text-decoration: none;
            font-size: 0.85rem;
            transition: color 0.3s;
        }

        .back-link:hover {
            color: var(--gold);
        }

        /* Dashboard */
        .dashboard {
            display: none;
            background: var(--terminal-bg);
            min-height: 100vh;
        }

        .dash-header {
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding: 1.5rem 3%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .dash-brand {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            color: var(--gold);
        }

        .dash-meta {
            display: flex;
            align-items: center;
            gap: 2rem;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            color: var(--green);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--green);
            border-radius: 50%;
            animation: pulse 2s infinite;
            box-shadow: 0 0 10px var(--green);
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .logout-btn {
            background: transparent;
            border: 1px solid var(--red);
            color: var(--red);
            padding: 0.6rem 1.5rem;
            cursor: pointer;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            transition: all 0.3s;
            border-radius: 4px;
        }

        .logout-btn:hover {
            background: var(--red);
            color: white;
        }

        .dash-content {
            padding: 3rem 5%;
            max-width: 1400px;
            margin: 0 auto;
        }

        .tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 3rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .tab {
            padding: 1rem 2rem;
            background: transparent;
            border: none;
            color: var(--gray);
            cursor: pointer;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            transition: color 0.3s;
        }

        .tab.active {
            color: var(--gold);
        }

        .tab.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--gold);
            box-shadow: 0 -5px 20px var(--gold);
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.5s;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Upload Grid */
        .upload-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 2rem;
        }

        .upload-card {
            background: var(--elevated);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 2rem;
            position: relative;
            transition: all 0.3s;
        }

        .upload-card:hover {
            border-color: rgba(201,169,97,0.2);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .slot-label {
            position: absolute;
            top: -12px;
            left: 20px;
            background: var(--terminal-bg);
            padding: 0.3rem 1rem;
            border: 1px solid rgba(201,169,97,0.3);
            border-radius: 20px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: var(--gold);
        }

        /* Upload Area */
        .upload-area {
            border: 2px dashed rgba(255,255,255,0.2);
            border-radius: 8px;
            height: 220px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 1rem;
            position: relative;
            overflow: hidden;
            background: rgba(0,0,0,0.2);
        }

        .upload-area:hover {
            border-color: var(--gold);
            background: rgba(201,169,97,0.05);
        }

        .upload-area.has-image {
            border-style: solid;
            border-color: var(--green);
            border-width: 2px;
        }

        .upload-area input[type="file"] {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
            z-index: 10;
        }

        .upload-placeholder {
            text-align: center;
            pointer-events: none;
            z-index: 1;
        }

        .upload-icon {
            font-size: 3rem;
            margin-bottom: 0.5rem;
            opacity: 0.5;
        }

        .upload-text {
            color: var(--gray);
            font-size: 0.9rem;
        }

        .upload-hint {
            color: #505050;
            font-size: 0.75rem;
            margin-top: 0.5rem;
        }

        .image-preview {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
            z-index: 5;
        }

        .image-preview.active {
            display: block;
        }

        .remove-image {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 30px;
            height: 30px;
            background: var(--red);
            border: none;
            color: white;
            border-radius: 50%;
            cursor: pointer;
            z-index: 20;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            transition: transform 0.2s;
        }

        .remove-image:hover {
            transform: scale(1.1);
        }

        .upload-area.has-image .remove-image {
            display: flex;
        }

        .upload-area.has-image .upload-placeholder {
            opacity: 0;
        }

        .upload-input {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 1rem;
            color: white;
            margin-bottom: 1rem;
            border-radius: 6px;
            font-family: inherit;
            font-size: 0.95rem;
        }

        .upload-input:focus {
            outline: none;
            border-color: var(--gold);
        }

        .upload-btn {
            width: 100%;
            padding: 1rem;
            background: rgba(201,169,97,0.1);
            border: 1px solid var(--gold);
            color: var(--gold);
            cursor: pointer;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s;
            border-radius: 6px;
            font-weight: 600;
        }

        .upload-btn:hover:not(:disabled) {
            background: var(--gold);
            color: var(--deep-black);
            box-shadow: 0 5px 20px rgba(201,169,97,0.3);
        }

        .upload-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            border-color: var(--gray);
            color: var(--gray);
        }

        .upload-btn.success {
            background: var(--green);
            border-color: var(--green);
            color: var(--deep-black);
        }

        /* Items List */
        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 1.5rem;
        }

        .item-card {
            background: var(--elevated);
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
            position: relative;
            transition: transform 0.3s;
        }

        .item-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
        }

        .item-card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            display: block;
        }

        .item-info {
            padding: 1.2rem;
        }

        .item-title {
            color: white;
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .item-description {
            color: var(--gray);
            font-size: 0.85rem;
            margin-bottom: 0.5rem;
            line-height: 1.4;
        }

        .item-price {
            color: var(--gold);
            font-weight: 600;
            font-size: 1rem;
            margin-bottom: 0.5rem;
        }

        .item-date {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: var(--gray);
            margin-bottom: 0.5rem;
        }

        .item-schedule {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: var(--gold);
        }

        .delete-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 35px;
            height: 35px;
            background: var(--red);
            border: none;
            color: white;
            border-radius: 6px;
            cursor: pointer;
            opacity: 0;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            z-index: 10;
        }

        .item-card:hover .delete-btn {
            opacity: 1;
        }

        .delete-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(255,68,68,0.5);
        }

        /* Reviews */
        .review-item {
            background: var(--elevated);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: start;
            gap: 2rem;
            transition: all 0.3s;
        }

        .review-item:hover {
            border-color: rgba(255,255,255,0.1);
            transform: translateX(5px);
        }

        .review-content h4 {
            color: var(--gold);
            margin-bottom: 0.3rem;
            font-size: 1.1rem;
        }

        .review-stars {
            color: var(--gold);
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            letter-spacing: 2px;
        }

        .review-text {
            color: #aaa;
            line-height: 1.6;
            font-size: 0.95rem;
        }

        .review-meta {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: var(--gray);
            margin-top: 0.8rem;
        }

        .del-review-btn {
            background: transparent;
            border: 1px solid var(--red);
            color: var(--red);
            padding: 0.6rem 1.2rem;
            cursor: pointer;
            font-size: 0.8rem;
            border-radius: 4px;
            transition: all 0.3s;
            white-space: nowrap;
            font-family: inherit;
        }

        .del-review-btn:hover {
            background: var(--red);
            color: white;
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--elevated);
            border: 1px solid var(--green);
            color: var(--green);
            padding: 1rem 2rem;
            border-radius: 8px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            display: none;
            z-index: 1000;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            animation: slideUp 0.3s;
        }

        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @media (max-width: 768px) {
            .upload-grid { grid-template-columns: 1fr; }
            .dash-meta { gap: 1rem; }
            .tabs { overflow-x: auto; }
            .delete-btn { opacity: 1; }
        }
    </style>
</head>
<body>
    <div id="loginScreen" class="login-screen">
        <div class="terminal-box">
            <div class="terminal-header">
                <div class="terminal-dot dot-red"></div>
                <div class="terminal-dot dot-yellow"></div>
                <div class="terminal-dot dot-green"></div>
                <span class="terminal-title">root@suxy:~</span>
            </div>
            <h2>Developer Access Portal</h2>
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="input-group">
                    <label>Username</label>
                    <input type="text" id="username" class="terminal-input" placeholder="Enter username..." required autocomplete="off">
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="password" class="terminal-input" placeholder="Enter password..." required>
                </div>
                <button type="submit" class="terminal-btn">Authenticate</button>
                <div id="errorMsg" class="error-msg">Access Denied: Invalid Credentials</div>
            </form>
            <a href="index.html" class="back-link">← Return to Main Site</a>
        </div>
    </div>

    <div id="dashboard" class="dashboard">
        <header class="dash-header">
            <div class="dash-brand">SUXY Developer Console</div>
            <div class="dash-meta">
                <div class="status-indicator">
                    <div class="status-dot"></div>
                    <span>System Online</span>
                </div>
                <button class="logout-btn" onclick="logout()">Terminate Session</button>
            </div>
        </header>

        <div class="dash-content">
            <div class="tabs">
                <button class="tab active" onclick="switchTab('upload', this)">Upload Inventory</button>
                <button class="tab" onclick="switchTab('manage', this)">Manage Items</button>
                <button class="tab" onclick="switchTab('reviews', this)">Moderate Reviews</button>
            </div>

            <div id="uploadTab" class="tab-content active">
                <div class="upload-grid" id="uploadGrid"></div>
            </div>

            <div id="manageTab" class="tab-content">
                <div id="itemsList" class="items-grid"></div>
            </div>

            <div id="reviewsTab" class="tab-content">
                <div id="reviewsList"></div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast">Operation Successful</div>

    <script>
        const CREDENTIALS = [
            { username: '07044696807', password: 'SRW1' },
            { username: '07012305403', password: 'SRW1' }
        ];

        const uploadData = {};

        window.onload = () => {
            if (sessionStorage.getItem('suxy_auth') === 'true') {
                showDashboard();
            }
        };

        function handleLogin(e) {
            e.preventDefault();
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            
            const valid = CREDENTIALS.some(c => c.username === u && c.password === p);
            
            if (valid) {
                sessionStorage.setItem('suxy_auth', 'true');
                showDashboard();
            } else {
                const err = document.getElementById('errorMsg');
                err.style.display = 'block';
                setTimeout(() => err.style.display = 'none', 3000);
            }
        }

        function showDashboard() {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            initUploadSlots();
            loadItems();
            loadReviews();
        }

        function logout() {
            sessionStorage.removeItem('suxy_auth');
            window.location.reload();
        }

        function switchTab(tab, btn) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            
            btn.classList.add('active');
            document.getElementById(tab + 'Tab').classList.add('active');
            
            if (tab === 'manage') loadItems();
            if (tab === 'reviews') loadReviews();
        }

        function initUploadSlots() {
            const grid = document.getElementById('uploadGrid');
            grid.innerHTML = '';
            
            for (let i = 1; i <= 10; i++) {
                const card = document.createElement('div');
                card.className = 'upload-card';
                card.innerHTML = `
                    <div class="slot-label">Slot ${i}</div>
                    <div class="upload-area" id="area${i}" onclick="triggerFileInput(${i})">
                        <input type="file" 
                               id="file${i}" 
                               accept="image/*" 
                               onchange="handleFileSelect(${i}, this)"
                               onclick="event.stopPropagation()">
                        <div class="upload-placeholder" id="placeholder${i}">
                            <div class="upload-icon">📷</div>
                            <div class="upload-text">Click to select image</div>
                            <div class="upload-hint">or drag and drop</div>
                        </div>
                        <img id="preview${i}" class="image-preview" alt="Preview">
                        <button type="button" 
                                class="remove-image" 
                                id="remove${i}" 
                                onclick="removeImage(${i}, event)"
                                title="Remove image">×</button>
                    </div>
                    <input type="text" 
                           id="name${i}" 
                           class="upload-input" 
                           placeholder="Enter item name..." 
                           oninput="validateForm(${i})">
                    <input type="text" 
                           id="description${i}" 
                           class="upload-input" 
                           placeholder="Enter item description..." 
                           oninput="validateForm(${i})">
                    <input type="number" 
                           id="price${i}" 
                           class="upload-input" 
                           placeholder="Enter price (e.g., 25000)" 
                           step="0.01"
                           min="0"
                           oninput="validateForm(${i})">
                    <div style="margin-bottom: 1rem;">
                        <label style="display: block; font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; color: #6c6c6c; margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 1px;">Schedule Deletion (Optional)</label>
                        <input type="datetime-local" 
                               id="schedule${i}" 
                               class="upload-input" 
                               style="font-family: 'JetBrains Mono', monospace;">
                    </div>
                    <button class="upload-btn" 
                            id="btn${i}" 
                            onclick="uploadItem(${i})" 
                            disabled>Upload to Store</button>
                `;
                grid.appendChild(card);
                
                uploadData[i] = { file: null, name: '', description: '', price: '', scheduledDelete: null };
            }
        }

        function triggerFileInput(slot) {
            if (!uploadData[slot].file) {
                document.getElementById(`file${slot}`).click();
            }
        }

        function handleFileSelect(slot, input) {
            const file = input.files[0];
            if (!file) return;

            if (!file.type.startsWith('image/')) {
                showToast('Error: Please select an image file');
                input.value = '';
                return;
            }

            if (file.size > 5 * 1024 * 1024) {
                showToast('Error: Image must be less than 5MB');
                input.value = '';
                return;
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                const preview = document.getElementById(`preview${slot}`);
                const area = document.getElementById(`area${slot}`);
                
                preview.src = e.target.result;
                preview.classList.add('active');
                area.classList.add('has-image');
                
                uploadData[slot].file = e.target.result;
                uploadData[slot].fileName = file.name;
                
                validateForm(slot);
                showToast('Image selected successfully');
            };
            reader.readAsDataURL(file);
        }

        function removeImage(slot, event) {
            event.stopPropagation();
            
            const input = document.getElementById(`file${slot}`);
            input.value = '';
            
            const preview = document.getElementById(`preview${slot}`);
            preview.src = '';
            preview.classList.remove('active');
            
            const area = document.getElementById(`area${slot}`);
            area.classList.remove('has-image');
            
            uploadData[slot].file = null;
            uploadData[slot].fileName = '';
            
            validateForm(slot);
        }

        function validateForm(slot) {
            const name = document.getElementById(`name${slot}`).value.trim();
            const description = document.getElementById(`description${slot}`).value.trim();
            const price = document.getElementById(`price${slot}`).value.trim();
            const hasFile = uploadData[slot].file !== null;
            const btn = document.getElementById(`btn${slot}`);
            
            uploadData[slot].name = name;
            uploadData[slot].description = description;
            uploadData[slot].price = price;
            
            btn.disabled = !(hasFile && name.length > 0 && description.length > 0 && price.length > 0);
            
            if (hasFile && name.length > 0 && description.length > 0 && price.length > 0) {
                btn.textContent = 'Upload to Store';
                btn.classList.remove('success');
            }
        }

        function uploadItem(slot) {
            const btn = document.getElementById(`btn${slot}`);
            const name = uploadData[slot].name;
            const description = uploadData[slot].description;
            const price = uploadData[slot].price;
            const image = uploadData[slot].file;
            const scheduleInput = document.getElementById(`schedule${slot}`).value;
            
            if (!name || !description || !price || !image) {
                showToast('Error: Please fill in all required fields');
                return;
            }

            if (isNaN(price) || parseFloat(price) < 0) {
                showToast('Error: Please enter a valid price');
                return;
            }

            const item = {
                id: 'item_' + Date.now() + '_' + slot,
                name: name,
                description: description,
                price: parseFloat(price),
                image: image,
                added: new Date().toISOString(),
                scheduledDelete: scheduleInput ? new Date(scheduleInput).toISOString() : null
            };

            let items = JSON.parse(localStorage.getItem('suxy_items') || '[]');
            items.push(item);
            localStorage.setItem('suxy_items', JSON.stringify(items));

            btn.textContent = '✓ Uploaded Successfully';
            btn.classList.add('success');
            btn.disabled = true;
            
            const message = scheduleInput ? `"${name}" uploaded (deletes at scheduled time)` : `"${name}" uploaded successfully`;
            showToast(message);
            
            setTimeout(() => {
                resetSlot(slot);
            }, 2000);
        }

        function resetSlot(slot) {
            const input = document.getElementById(`file${slot}`);
            input.value = '';
            
            const preview = document.getElementById(`preview${slot}`);
            preview.src = '';
            preview.classList.remove('active');
            
            const area = document.getElementById(`area${slot}`);
            area.classList.remove('has-image');
            
            document.getElementById(`name${slot}`).value = '';
            document.getElementById(`description${slot}`).value = '';
            document.getElementById(`price${slot}`).value = '';
            document.getElementById(`schedule${slot}`).value = '';
            
            const btn = document.getElementById(`btn${slot}`);
            btn.textContent = 'Upload to Store';
            btn.classList.remove('success');
            btn.disabled = true;
            
            uploadData[slot] = { file: null, name: '', description: '', price: '', scheduledDelete: null };
        }

        function loadItems() {
            const items = JSON.parse(localStorage.getItem('suxy_items') || '[]');
            const list = document.getElementById('itemsList');
            
            if (items.length === 0) {
                list.innerHTML = '<p style="color: var(--gray); text-align: center; padding: 3rem; font-size: 1.1rem;">No items in inventory</p>';
                return;
            }
            
            items.sort((a, b) => new Date(b.added) - new Date(a.added));
            
            list.innerHTML = items.map(item => `
                <div class="item-card">
                    <button class="delete-btn" onclick="deleteItem('${item.id}')" title="Delete item">×</button>
                    <img src="${item.image}" alt="${escapeHtml(item.name)}" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22250%22 height=%22250%22><rect width=%22250%22 height=%22250%22 fill=%22%23111%22/><text x=%2250%%22 y=%2250%%22 fill=%22%23666%22 text-anchor=%22middle%22>Image Error</text></svg>'">
                    <div class="item-info">
                        <div class="item-title">${escapeHtml(item.name)}</div>
                        <div class="item-description">${escapeHtml(item.description)}</div>
                        <div class="item-price">₦${parseFloat(item.price).toLocaleString()}</div>
                        <div class="item-date">Added: ${new Date(item.added).toLocaleDateString()} ${new Date(item.added).toLocaleTimeString()}</div>
                        ${item.scheduledDelete ? `<div class="item-schedule">Deletes: ${new Date(item.scheduledDelete).toLocaleDateString()} ${new Date(item.scheduledDelete).toLocaleTimeString()}</div>` : ''}
                    </div>
                </div>
            `).join('');
        }

        function deleteItem(id) {
            if (!confirm('Are you sure you want to delete this item?\n\nThis action cannot be undone.')) return;
            
            let items = JSON.parse(localStorage.getItem('suxy_items') || '[]');
            const item = items.find(i => i.id === id);
            items = items.filter(i => i.id !== id);
            localStorage.setItem('suxy_items', JSON.stringify(items));
            
            loadItems();
            showToast(item ? `"${item.name}" deleted` : 'Item deleted');
        }

        function loadReviews() {
            const reviews = JSON.parse(localStorage.getItem('suxy_reviews') || '[]');
            const list = document.getElementById('reviewsList');
            
            if (reviews.length === 0) {
                list.innerHTML = '<p style="color: var(--gray); text-align: center; padding: 3rem; font-size: 1.1rem;">No reviews to moderate</p>';
                return;
            }
            
            reviews.sort((a, b) => new Date(b.date) - new Date(a.date));
            
            list.innerHTML = reviews.map(r => `
                <div class="review-item">
                    <div class="review-content">
                        <h4>${escapeHtml(r.name)}</h4>
                        <div class="review-stars">${'★'.repeat(r.rating)}${'☆'.repeat(5-r.rating)}</div>
                        <div class="review-text">${escapeHtml(r.text)}</div>
                        <div class="review-meta">${new Date(r.date).toLocaleString()}</div>
                    </div>
                    <button class="del-review-btn" onclick="deleteReview(${r.id})">Remove Review</button>
                </div>
            `).join('');
        }

        function deleteReview(id) {
            if (!confirm('Remove this review permanently?')) return;
            
            let reviews = JSON.parse(localStorage.getItem('suxy_reviews') || '[]');
            reviews = reviews.filter(r => r.id !== id);
            localStorage.setItem('suxy_reviews', JSON.stringify(reviews));
            
            loadReviews();
            showToast('Review removed');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.style.display = 'block';
            toast.style.borderColor = message.includes('Error') ? '#ff4444' : '#00ff88';
            toast.style.color = message.includes('Error') ? '#ff4444' : '#00ff88';
            
            setTimeout(() => {
                toast.style.display = 'none';
            }, 3000);
        }

        window.onbeforeunload = function() {
            const hasPending = Object.values(uploadData).some(d => d.file !== null);
            if (hasPending) {
                return "You have unsaved uploads. Are you sure you want to leave?";
            }
        };
    </script>
</body>
</html>
