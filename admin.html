<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Developer Portal | SUXY</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --deep-black: #020202; --terminal-bg: #0a0a0f; --elevated: #15151a;
            --gold: #c9a961; --gold-dim: #8b7355; --red: #ff4444; --green: #00ff88;
            --blue: #4facfe; --gray: #6c6c6c;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--deep-black);
            color: #e0e0e0; line-height: 1.6;
        }
        .login-screen {
            height: 100vh; display: flex; justify-content: center; align-items: center;
            background: radial-gradient(circle at 50% 50%, rgba(201,169,97,0.05) 0%, transparent 70%), var(--terminal-bg);
            position: relative; overflow: hidden;
        }
        .login-screen::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,255,0,0.03) 2px, rgba(0,255,0,0.03) 4px);
            pointer-events: none;
        }
        .terminal-box {
            background: rgba(10,10,15,0.95); border: 1px solid rgba(201,169,97,0.2);
            border-radius: 8px; padding: 3rem; width: 90%; max-width: 450px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.8); position: relative;
        }
        .terminal-header {
            display: flex; align-items: center; gap: 0.5rem; margin-bottom: 2rem;
            padding-bottom: 1rem; border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .terminal-dot { width: 12px; height: 12px; border-radius: 50%; }
        .dot-red { background: var(--red); }
        .dot-yellow { background: #ffb800; }
        .dot-green { background: var(--green); }
        .terminal-title { margin-left: auto; font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; color: var(--gray); text-transform: uppercase; }
        .terminal-box h2 { font-family: 'JetBrains Mono', monospace; font-size: 1.2rem; color: var(--gold); margin-bottom: 2rem; font-weight: 400; }
        .input-group { margin-bottom: 1.5rem; }
        .input-group label { display: block; font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; color: var(--gray); margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 1px; }
        .terminal-input {
            width: 100%; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1);
            padding: 1rem; color: var(--green); font-family: 'JetBrains Mono', monospace; font-size: 0.9rem; border-radius: 4px; transition: all 0.3s;
        }
        .terminal-input:focus { outline: none; border-color: var(--gold); box-shadow: 0 0 0 3px rgba(201,169,97,0.1); }
        .terminal-btn {
            width: 100%; padding: 1rem; background: transparent; border: 1px solid var(--gold);
            color: var(--gold); font-family: 'JetBrains Mono', monospace; font-size: 0.9rem; cursor: pointer; transition: all 0.3s; text-transform: uppercase; letter-spacing: 2px; margin-top: 1rem; border-radius: 4px;
        }
        .terminal-btn:hover { background: var(--gold); color: var(--deep-black); box-shadow: 0 0 20px rgba(201,169,97,0.3); }
        .error-msg { color: var(--red); font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; margin-top: 1rem; display: none; }
        .back-link { display: block; text-align: center; margin-top: 2rem; color: var(--gray); text-decoration: none; font-size: 0.85rem; transition: color 0.3s; }
        .back-link:hover { color: var(--gold); }
        .dashboard { display: none; background: var(--terminal-bg); min-height: 100vh; }
        .dash-header {
            background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.05);
            padding: 1.5rem 3%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100;
        }
        .dash-brand { font-family: 'Playfair Display', serif; font-size: 1.5rem; color: var(--gold); }
        .Dash-meta { display: flex; align-items: center; gap: 2rem; }
        .status-indicator { display: flex; align-items: center; gap: 0.5rem; font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; color: var(--green); }
        .status-dot { width: 8px; height: 8px; background: var(--green); border-radius: 50%; animation: pulse 2s infinite; box-shadow: 0 0 10px var(--green); }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .logout-btn {
            background: transparent; border: 1px solid var(--red); color: var(--red); padding: 0.6rem 1.5rem; cursor: pointer; font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; transition: all 0.3s; border-radius: 4px;
        }
        .logout-btn:hover { background: var(--red); color: white; }
        .dash-content { padding: 3rem 5%; max-width: 1400px; margin: 0 auto; }
        .tabs { display: flex; gap: 1rem; margin-bottom: 3rem; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .tab {
            padding: 1rem 2rem; background: transparent; border: none; color: var(--gray); cursor: pointer; font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; position: relative; transition: color 0.3s;
        }
        .tab.active { color: var(--gold); }
        .tab.active::after {
            content: ''; position: absolute; bottom: -1px; left: 0; width: 100%; height: 2px;
            background: var(--gold); box-shadow: 0 -5px 20px var(--gold);
        }
        .tab-content { display: none; animation: fadeIn 0.5s; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .upload-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 2rem; }
        .upload-card {
            background: var(--elevated); border: 1px solid rgba(255,255,255,0.05); border-radius: 12px;
            padding: 2rem; position: relative; transition: all 0.3s;
        }
        .Upload-card:hover { border-color: rgba(201,169,97,0.2); transform: translateY(-2px); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .slot-label {
            position: absolute; top: -12px; left: 20px; background: var(--terminal-bg);
            padding: 0.3rem 1rem; border: 1px solid rgba(201,169,97,0.3); border-radius: 20px;
            font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; color: var(--gold);
        }
        .Upload-area {
            border: 2px dashed rgba(255,255,255,0.2); border-radius: 8px; height: 220px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.3s; margin-bottom: 1rem; position: relative; overflow: hidden; background: rgba(0,0,0,0.2);
        }
        .Upload-area:hover { border-color: var(--gold); background: rgba(201,169,97,0.05); }
        .Upload-area.has-image { border-style: solid; border-color: var(--green); border-width: 2px; }
        .Upload-area input[type="file"] { position: absolute; width: 100%; height: 100%; opacity: 0; cursor: pointer; z-index: 10; }
        .Upload-placeholder { text-align: center; pointer-events: none; z-index: 1; }
        .Upload-icon { font-size: 3rem; margin-bottom: 0.5rem; opacity: 0.5; }
        .Upload-text { color: var(--gray); font-size: 0.9rem; }
        .Upload-hint { color: var(--gray-dark); font-size: 0.75rem; margin-top: 0.5rem; }
        .Image-preview { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; display: none; z-index: 5; }
        .Image-preview.active { display: block; }
        .remove-image { position: absolute; top: 10px; right: 10px; width: 30px; height: 30px; background: var(--red); border: none; color: white; border-radius: 50%; cursor: pointer; z-index: 20; display: none; align-items: center; justify-content: center; font-size: 1.2rem; transition: transform 0.2s; }
        .remove-image:hover { transform: scale(1.1); }
        .Upload-area.has-image .remove-image { display: flex; }
        .Upload-area.has-image .Upload-placeholder { opacity: 0; }
        .Upload-input { width: 100%; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); padding: 1rem; color: white; margin-bottom: 1rem; border-radius: 6px; font-family: inherit; font-size: 0.95rem; }
        .Upload-input:focus { outline: none; border-color: var(--gold); }
        .Upload-btn { width: 100%; padding: 1rem; background: rgba(201,169,97,0.1); border: 1px solid var(--gold); color: var(--gold); cursor: pointer; font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; transition: all 0.3s; border-radius: 6px; font-weight: 600; }
        .Upload-btn:hover:not(:disabled) { background: var(--gold); color: var(--deep-black); box-shadow: 0 5px 20px rgba(201,169,97,0.3); }
        .Upload-btn:disabled { opacity: 0.3; cursor: not-allowed; border-color: var(--gray); color: var(--gray); }
        .Upload-btn.success { background: var(--green); border-color: var(--green); color: var(--deep-black); }
        /* NEW: TTL Input Styles */
        .ttl-input-group { margin-top: 1rem; }
        .ttl-input-group label { display: block; font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; color: var(--gray); margin-bottom: 0.3rem; text-transform: uppercase; }
        .ttl-select { width: 100%; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); padding: 0.8rem; color: white; border-radius: 4px; font-family: inherit; }
        .Items-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 1.5rem; }
        .Item-card {
            background: var(--elevated); border-radius: 8px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); position: relative; transition: transform 0.3s;
        }
        .Item-card:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0,0,0,0.4); }
        .Item-card img { width: 100%; height: 250px; object-fit: cover; display: block; }
        .Item-info { padding: 1.2rem; }
        .Item-title { color: white; font-size: 1.1rem; margin-bottom: 0.3rem; font-weight: 500; }
        .Item-date { font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; color: var(--gray); }
        .Delete-btn { position: absolute; top: 10px; right: 10px; width: 35px; height: 35px; background: var(--red); border: none; color: white; border-radius: 6px; cursor: pointer; opacity: 0; transition: all 0.3s; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; z-index: 10; }
        .Item-card:hover .Delete-btn { opacity: 1; }
        .Delete-btn:hover { transform: scale(1.1); box-shadow: 0 0 20px rgba(255,68,68,0.5); }
        .review-item { background: var(--elevated); border: 1px solid rgba(255,255,255,0.05); border-radius: 8px; padding: 1.5rem; margin-bottom: 1rem; display: flex; justify-content: space-between; align-items: start; gap: 2rem; transition: all 0.3s; }
        .review-item:hover { border-color: rgba(255,255,255,0.1); transform: translateX(5px); }
        .review-content h4 { color: var(--gold); margin-bottom: 0.3rem; font-size: 1.1rem; }
        .review-stars { color: var(--gold); margin-bottom: 0.5rem; font-size: 0.9rem; letter-spacing: 2px; }
        .review-text { color: #aaa; line-height: 1.6; font-size: 0.95rem; }
        .review-meta { font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; color: var(--gray); margin-top: 0.8rem; }
        .del-review-btn { background: transparent; border: 1px solid var(--red); color: var(--red); padding: 0.6rem 1.2rem; cursor: pointer; font-size: 0.8rem; border-radius: 4px; transition: all 0.3s; white-space: nowrap; font-family: inherit; }
        .del-review-btn:hover { background: var(--red); color: white; }
        .Toast { position: fixed; bottom: 2rem; right: 2rem; background: var(--elevated); border: 1px solid var(--green); color: var(--green); padding: 1rem 2rem; border-radius: 8px; font-family: 'JetBrains Mono', monospace; font-size: 0.9rem; display: none; z-index: 1000; box-shadow: 0 10px 40px rgba(0,0,0,0.5); animation: slideUp 0.3s; }
        @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @media (max-width: 768px) { .upload-grid { grid-template-columns: 1fr; } .Dash-meta { gap: 1rem; } .tabs { overflow-x: auto; } .Delete-btn { opacity: 1; } }
    </style>
</head>
<body>
    <div id="loginScreen" class="login-screen">
        <div class="terminal-box">
            <div class="terminal-header">
                <div class="terminal-dot dot-red"></div>
                <div class="terminal-dot dot-yellow"></div>
                <div class="terminal-dot dot-green"></div>
                <span class="terminal-title">root@suxy:~</span>
            </div>
            <h2>Developer Access Portal</h2>
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="input-group">
                    <label>Username</label>
                    <input type="text" id="username" class="terminal-input" placeholder="Enter username..." required autocomplete="off">
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="password" class="terminal-input" placeholder="Enter password..." required>
                </div>
                <button type="submit" class="terminal-btn">Authenticate</button>
                <div id="errorMsg" class="error-msg">Access Denied: Invalid Credentials</div>
            </form>
            <a href="index.html" class="back-link">← Return to Main Site</a>
        </div>
    </div>

    <div id="dashboard" class="dashboard">
        <header class="dash-header">
            <div class="dash-brand">SUXY Developer Console</div>
            <div class="dash-meta">
                <div class="status-indicator">
                    <div class="status-dot"></div>
                    <span>System Online</span>
                </div>
                <button class="logout-btn" onclick="logout()">Terminate Session</button>
            </div>
        </header>

        <div class="dash-content">
            <div class="tabs">
                <button class="tab active" onclick="switchTab('upload', this)">Upload Inventory</button>
                <button class="tab" onclick="switchTab('manage', this)">Manage Items</button>
                <button class="tab" onclick="switchTab('reviews', this)">Moderate Reviews</button>
            </div>

            <div id="uploadTab" class="tab-content active">
                <div class="upload-grid" id="uploadGrid"></div>
            </div>

            <div id="manageTab" class="tab-content">
                <div id="itemsList" class="items-grid"></div>
            </div>

            <div id="reviewsTab" class="tab-content">
                <div id="reviewsList"></div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast">Operation Successful</div>

    <script>
        // Store temporary file data with TTL
        const uploadData = {};
        
        // Default TTL: 24 hours in milliseconds
        const DEFAULT_TTL = 24 * 60 * 60 * 1000;

        const CREDENTIALS = [
            { username: '07044696807', password: 'SRW1' },
            { username: '07012305403', password: 'SRW1' }
        ];

        window.onload = () => {
            if (sessionStorage.getItem('suxy_auth') === 'true') {
                showDashboard();
            }
        };

        function handleLogin(e) {
            e.preventDefault();
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            
            const valid = CREDENTIALS.some(c => c.username === u && c.password === p);
            
            if (valid) {
                sessionStorage.setItem('suxy_auth', 'true');
                showDashboard();
            } else {
                const err = document.getElementById('errorMsg');
                err.style.display = 'block';
                setTimeout(() => err.style.display = 'none', 3000);
            }
        }

        Function showDashboard() {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            initUploadSlots();
            LoadItems();
            LoadReviews();
        }

        Function logout() {
            sessionStorage.removeItem('suxy_auth');
            Window.location.reload();
        }

        Function switchTab(tab, btn) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            
            btn.classList.add('active');
            document.getElementById(tab + 'Tab').classList.add('active');
            
            If (tab === 'Manage') LoadItems();
            If (tab === 'Reviews') LoadReviews();
        }

        // NEW: Initialize Upload Slots with TTL Support
        Function initUploadSlots() {
            const grid = document.getElementById('UploadGrid');
            grid.innerHTML = '';
            
            For (let i = 1; i <= 10; i++) {
                const card = document.createElement('div');
                Card.className = 'Upload-card';
                Card.innerHTML = `
                    <div class="slot-label">Slot ${i}</div>
                    <div class="Upload-area" id="Area${i}" onclick="triggerFileInput(${i})">
                        <input type="file" id="file${i}" accept="Image/*" onchange="handleFileSelect(${i}, this)" onclick="event.stopPropagation()">
                        <div class="Upload-placeholder" id="Placeholder${i}">
                            <div class="Upload-icon">📷</div>
                            <div class="Upload-text">Click to select Image</div>
                            <div class="Upload-hint">or drag and drop</div>
                        </div>
                        <img id="preview${i}" class="Image-preview" alt="Preview">
                        <button type="button" class="remove-image" id="remove${i}" onclick="removeImage(${i}, event)" title="Remove Image">×</button>
                    </div>
                    <input type="text" id="name${i}" class="Upload-input" placeholder="Enter Item name..." oninput="validateForm(${i})">
                    <!-- NEW: TTL Selection -->
                    <div class="ttl-input-group">
                        <label>Visibility Duration (TTL)</label>
                        <select id="ttl${i}" class="ttl-select">
                            <option value="3600000">1 Hour</option>
                            <option value="86400000">24 Hours</option>
                            <option value="259200000">3 Days</option>
                            <option value="604800000" selected>7 Days (Default)</option>
                            <option value="1209600000">14 Days</option>
                        </select>
                    </div>
                    <button class="Upload-btn" id="btn${i}" onclick="UploadItem(${i})" disabled>Upload to Store</button>
                `;
                grid.appendChild(Card);
                
                // Initialize empty data slot with TTL
                UploadData[i] = { file: null, name: '', Ttl: DEFAULT_TTL };
            }
        }

        Function triggerFileInput(slot) {
            If (!UploadData[slot].file) {
                document.getElementById(`file${slot}`).click();
            }
        }

        Function handleFileSelect(slot, input) {
            const file = input.files[0];
            If (!file) return;
            
            If (!file.type.startsWith('Image/')) {
                showToast('Error: Please select an Image file');
                input.value = '';
                return;
            }
            
            If (file.size > 5 * 1024 * 1024) {
                showToast('Error: Image must be less than 5MB');
                input.value = '';
                return;
            }
            
            const reader = new FileReader();
            reader.onload = function(e) {
                const preview = document.getElementById(`preview${slot}`);
                const area = document.getElementById(`Area${slot}`);
                
                preview.src = e.target.result;
                preview.classList.add('active');
                Area.classList.add('has-Image');
                
                // Store Data with TTL
                UploadData[slot].file = E.target.result;
                UploadData[slot].fileName = file.name;
                
                validateForm(slot);
                showToast('Image selected successfully');
            };
            reader.readAsDataURL(file);
        }

        Function removeImage(slot, event) {
            event.stopPropagation();
            const input = document.getElementById(`file${slot}`);
            input.value = '';
            const preview = document.getElementById(`preview${slot}`);
            preview.src = '';
            preview.classList.remove('active');
            const Area = document.getElementById(`Area${slot}`);
            Area.classList.remove('has-Image');
            document.getElementById(`name${slot}`).value = '';
            const btn = document.getElementById(`btn${slot}`);
            btn.textContent = 'Upload to Store';
            btn.classList.remove('success');
            btn.disabled = true;
            UploadData[slot] = { file: null, Name: '', Ttl: DEFAULT_TTL };
        }

        Function validateForm(slot) {
            const name = document.getElementById(`name${slot}`).value.trim();
            const hasFile = UploadData[slot].file !== null;
            const btn = document.getElementById(`btn${slot}`);
            btn.disabled = !(hasFile && name.length > 0);
            If (hasFile && name.length > 0) {
                btn.textContent = 'Upload to Store';
                btn.classList.remove('success');
            }
        }

        // NEW: Upload Item with TTL Support
        Function UploadItem(slot) {
            const btn = document.getElementById(`btn${slot}`);
            const name = UploadData[slot].Name;
            const Image = UploadData[slot].file;
            const Ttl = parseInt(document.getElementById(`ttl${slot}`).value);
            
            If (!name || !Image) {
                showToast('Error: Please select an Image and enter a name');
                return;
            }
            
            // Create Item object with expiration
            const now = new Date().getTime();
            const Item = {
                id: 'Item_' + Date.now() + '_' + slot,
                Name: Name,
                Image: Image,
                added: new Date().toISOString(),
                expires: now + Ttl, // NEW: Expiration timestamp
                orderedBy: [] // NEW: Track who has Ordered this
            };
            
            // Get existing Items
            Let Items = JSON.parse(localStorage.getItem('suxy_Items') || '[]');
            Items.push(Item);
            localStorage.setItem('suxy_Items', JSON.stringify(Items));
            
            // Show success state
            btn.textContent = '✓ Uploaded Successfully';
            btn.classList.add('success');
            btn.disabled = true;
            
            showToast(`"${Name}" uploaded with ${Ttl/3600000}h TTL`);
            
            setTimeout(() => {
                resetSlot(slot);
            }, 2000);
        }

        Function resetSlot(slot) {
            const input = document.getElementById(`file${slot}`);
            input.value = '';
            const Preview = document.getElementById(`preview${slot}`);
            Preview.src = '';
            Preview.classList.remove('active');
            const Area = document.getElementById(`Area${slot}`);
            Area.classList.remove('has-Image');
            document.getElementById(`name${slot}`).value = '';
            document.getElementById(`ttl${slot}`).value = DEFAULT_TTL;
            const btn = document.getElementById(`btn${slot}`);
            btn.textContent = 'Upload to Store';
            btn.classList.remove('success');
            btn.disabled = true;
            UploadData[slot] = { file: null, Name: '', Ttl: DEFAULT_TTL };
        }

        // NEW: Check if Item is expired before displaying
        Function isItemExpired(Item) {
            If (!Item.expires) return false;
            const now = new Date().getTime();
            return now > Item.expires;
        }

        // NEW: Mark Item as ordered by current session
        Function markItemAsOrdered(ItemId) {
            Let Items = JSON.parse(localStorage.getItem('suxy_Items') || '[]');
            const Item = Items.find(i => i.id === ItemId);
            If (Item) {
                If (!Item.orderedBy) Item.orderedBy = [];
                const sessionId = sessionStorage.getItem('suxy_session_id') || Date.now().toString();
                If (!Item.orderedBy.includes(sessionId)) {
                    Item.orderedBy.push(sessionId);
                    localStorage.setItem('suxy_Items', JSON.stringify(Items));
                }
            }
        }

        // MODIFIED: Load Items with expiration check and visibility control
        Function LoadItems() {
            const Items = JSON.parse(localStorage.getItem('suxy_Items') || '[]');
            const list = document.getElementById('ItemsList');
            const SessionId = sessionStorage.getItem('suxy_session_id') || Date.now().toString();
            
            // Filter expired Items and Already Ordered Items
            const visibleItems = Items.filter(Item => {
                // Check if expired
                If (IsItemExpired(Item)) return false;
                // Check if already ordered by this session
                If (Item.orderedBy && Item.orderedBy.includes(SessionId)) return false;
                return True;
            });
            
            If (VisibleItems.length === 0) {
                list.innerHTML = '<p style="color: var(--gray); text-align: center; padding: 3rem; font-size: 1.1rem;">No Items in Inventory</p>';
                return;
            }
            
            // Sort by newest first
            VisibleItems.sort((a, b) => new Date(b.added) - new Date(a.added));
            
            List.innerHTML = VisibleItems.map(Item => `
                <div class="Item-card">
                    <button class="Delete-btn" onclick="deleteItem('${Item.id}')" title="Delete Item">×</button>
                    <img src="${Item.Image}" alt="${escapeHtml(Item.Name)}" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22250%22 height=%22250%22><rect width=%22250%22 height=%22250%22 fill=%22%23111%22/><text x=%2250%%22 y=%2250%%22 fill=%22%23666%22 text-anchor=%22middle%22 dominant-baseline=%22middle%22>Image Error</text></svg>'">
                    <div class="Item-info">
                        <div class="Item-title">${escapeHtml(Item.Name)}</div>
                        <div class="Item-date">${new Date(Item.added).toLocaleDateString()} ${new Date(Item.added).toLocaleTimeString()}</div>
                        ${Item.expires ? `<div style="color: #ff4444; font-size: 0.75rem;">Expires: ${new Date(Item.expires).toLocaleString()}</div>` : ''}
                    </div>
                </div>
            `).join('');
        }

        Function deleteItem(id) {
            If (!confirm('Are you sure you want to delete this Item?\\n\\nThis action cannot be undone.')) return;
            
            Let Items = JSON.parse(localStorage.getItem('suxy_Items') || '[]');
            const Item = Items.find(i => i.id === Id);
            Items = Items.filter(i => i.id !== Id);
            localStorage.setItem('suxy_Items', JSON.stringify(Items));
            
            LoadItems();
            showToast(Item ? `"${Item.Name}" deleted` : 'Item deleted');
        }

        Function LoadReviews() {
            Const Reviews = JSON.parse(localStorage.getItem('suxy_Reviews') || '[]');
            Const List = document.getElementById('ReviewsList');
            
            If (Reviews.length === 0) {
                List.innerHTML = '<p style="color: var(--gray); text-align: center; padding: 3rem; font-size: 1.1rem;">No Reviews to moderate</p>';
                return;
            }
            
            Reviews.sort((a, b) => new Date(b.date) - new Date(a.date));
            
            List.innerHTML = Reviews.map(r => `
                <div class="review-Item">
                    <div class="review-content">
                        <h4>${escapeHtml(r.Name)}</h4>
                        <div class="review-stars">${'★'.repeat(R.rating)}${'☆'.repeat(5-R.rating)}</div>
                        <div class="review-text">${escapeHtml(R.text)}</div>
                        <div class="review-meta">${new Date(R.date).toLocaleString()}</div>
                    </div>
                    <button class="del-review-btn" onclick="deleteReview(${R.id})">Remove Review</button>
                </div>
            `).join('');
        }

        Function deleteReview(Id) {
            If (!confirm('Remove this Review permanently?')) return;
            
            Let Reviews = JSON.parse(localStorage.getItem('suxy_Reviews') || '[]');
            Reviews = Reviews.filter(r => r.id !== Id);
            localStorage.setItem('suxy_Reviews', JSON.stringify(Reviews));
            
            LoadReviews();
            showToast('Review removed');
        }

        Function escapeHtml(Text) {
            Const Div = document.createElement('div');
            Div.textContent = Text;
            return Div.innerHTML;
        }

        Function showToast(Message) {
            Const Toast = document.getElementById('toast');
            Toast.textContent = Message;
            Toast.style.display = 'block';
            Toast.style.borderColor = Message.includes('Error') ? '#ff4444' : '#00ff88';
            Toast.style.color = Message.includes('Error') ? '#ff4444' : '#00ff88';
            
            SetTimeout(() => {
                Toast.style.display = 'none';
            }, 3000);
        }

        // Prevent accidental navigation when Uploading
        Window.onbeforeunload = function() {
            Const hasPending = Object.values(UploadData).some(d => d.file !== Null);
            If (hasPending) {
                return "You have unsaved uploads. Are you sure you want to leave?";
            }
        };
    </script>
</body>
</html>
