<!-- admin.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Developer Portal | SUXY</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --deep-black: #020202;
            --terminal-bg: #0a0a0f;
            --elevated: #15151a;
            --gold: #c9a961;
            --gold-dim: #8b7355;
            --red: #ff4444;
            --green: #00ff88;
            --blue: #4facfe;
            --gray: #6c6c6c;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--deep-black);
            color: #e0e0e0;
            line-height: 1.6;
        }

        /* Login Screen - Terminal Style */
        .login-screen {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: 
                radial-gradient(circle at 50% 50%, rgba(201,169,97,0.05) 0%, transparent 70%),
                var(--terminal-bg);
            position: relative;
            overflow: hidden;
        }

        .login-screen::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 2px,
                    rgba(0,255,0,0.03) 2px,
                    rgba(0,255,0,0.03) 4px
                );
            pointer-events: none;
        }

        .terminal-box {
            background: rgba(10,10,15,0.95);
            border: 1px solid rgba(201,169,97,0.2);
            border-radius: 8px;
            padding: 3rem;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.8);
            position: relative;
        }

        .terminal-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .terminal-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .dot-red { background: var(--red); }
        .dot-yellow { background: #ffb800; }
        .dot-green { background: var(--green); }

        .terminal-title {
            margin-left: auto;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            color: var(--gray);
            text-transform: uppercase;
        }

        .terminal-box h2 {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.2rem;
            color: var(--gold);
            margin-bottom: 2rem;
            font-weight: 400;
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        .input-group label {
            display: block;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: var(--gray);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .terminal-input {
            width: 100%;
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 1rem;
            color: var(--green);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            border-radius: 4px;
            transition: all 0.3s;
        }

        .terminal-input:focus {
            outline: none;
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(201,169,97,0.1);
        }

        .terminal-btn {
            width: 100%;
            padding: 1rem;
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 1rem;
            border-radius: 4px;
        }

        .terminal-btn:hover {
            background: var(--gold);
            color: var(--deep-black);
            box-shadow: 0 0 20px rgba(201,169,97,0.3);
        }

        .error-msg {
            color: var(--red);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            margin-top: 1rem;
            display: none;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 2rem;
            color: var(--gray);
            text-decoration: none;
            font-size: 0.85rem;
            transition: color 0.3s;
        }

        .back-link:hover {
            color: var(--gold);
        }

        /* Dashboard */
        .dashboard {
            display: none;
            background: var(--terminal-bg);
            min-height: 100vh;
        }

        .dash-header {
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding: 1.5rem 3%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .dash-brand {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            color: var(--gold);
        }

        .dash-meta {
            display: flex;
            align-items: center;
            gap: 2rem;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            color: var(--green);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--green);
            border-radius: 50%;
            animation: pulse 2s infinite;
            box-shadow: 0 0 10px var(--green);
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .logout-btn {
            background: transparent;
            border: 1px solid var(--red);
            color: var(--red);
            padding: 0.6rem 1.5rem;
            cursor: pointer;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            transition: all 0.3s;
            border-radius: 4px;
        }

        .logout-btn:hover {
            background: var(--red);
            color: white;
        }

        .dash-content {
            padding: 3rem 5%;
            max-width: 1400px;
            margin: 0 auto;
        }

        .tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 3rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .tab {
            padding: 1rem 2rem;
            background: transparent;
            border: none;
            color: var(--gray);
            cursor: pointer;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            transition: color 0.3s;
        }

        .tab.active {
            color: var(--gold);
        }

        .tab.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--gold);
            box-shadow: 0 -5px 20px var(--gold);
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.5s;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Upload Grid */
        .upload-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 2rem;
        }

        .upload-card {
            background: var(--elevated);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 8px;
            padding: 1.5rem;
            position: relative;
            transition: all 0.3s;
        }

        .upload-card:hover {
            border-color: rgba(201,169,97,0.2);
            transform: translateY(-2px);
        }

        .upload-card::before {
            content: attr(data-slot);
            position: absolute;
            top: -10px;
            left: 20px;
            background: var(--terminal-bg);
            padding: 0 10px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: var(--gold);
            border: 1px solid rgba(201,169,97,0.2);
            border-radius: 4px;
        }

        .drop-zone {
            border: 2px dashed rgba(255,255,255,0.1);
            border-radius: 6px;
            padding: 2rem;
            text-align: center;
            margin-bottom: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 0.5rem;
        }

        .drop-zone:hover {
            border-color: var(--gold);
            background: rgba(201,169,97,0.02);
        }

        .drop-zone.has-image {
            border-style: solid;
            border-color: var(--green);
            padding: 0;
        }

        .drop-zone input {
            display: none;
        }

        .drop-icon {
            width: 40px;
            height: 40px;
            stroke: var(--gray);
            fill: none;
            stroke-width: 1.5;
        }

        .drop-text {
            font-size: 0.85rem;
            color: var(--gray);
        }

        .preview-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
        }

        .upload-input, .upload-textarea {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 0.8rem;
            color: white;
            margin-bottom: 0.8rem;
            border-radius: 4px;
            font-family: inherit;
            font-size: 0.9rem;
        }

        .upload-textarea {
            resize: vertical;
            min-height: 60px;
            font-family: inherit;
        }

        .upload-input:focus, .upload-textarea:focus {
            outline: none;
            border-color: var(--gold);
        }

        .input-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.8rem;
        }

        .schedule-section {
            margin-top: 0.8rem;
            padding-top: 0.8rem;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        .schedule-toggle {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            font-size: 0.85rem;
            color: var(--gray);
            margin-bottom: 0.5rem;
        }

        .schedule-toggle input {
            accent-color: var(--gold);
        }

        .schedule-datetime {
            display: none;
        }

        .schedule-datetime.active {
            display: block;
        }

        .upload-btn {
            width: 100%;
            padding: 0.8rem;
            background: rgba(201,169,97,0.1);
            border: 1px solid var(--gold);
            color: var(--gold);
            cursor: pointer;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s;
            border-radius: 4px;
            margin-top: 0.5rem;
        }

        .upload-btn:hover:not(:disabled) {
            background: var(--gold);
            color: var(--deep-black);
        }

        .upload-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* Items List */
        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        .item-card {
            background: var(--elevated);
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
            position: relative;
        }

        .item-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .item-info {
            padding: 1rem;
        }

        .item-title {
            color: white;
            font-size: 1rem;
            margin-bottom: 0.3rem;
            font-weight: 600;
        }

        .item-price {
            color: var(--gold);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            margin-bottom: 0.3rem;
        }

        .item-desc {
            color: var(--gray);
            font-size: 0.8rem;
            line-height: 1.4;
            margin-bottom: 0.5rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .item-expiry {
            color: var(--red);
            font-size: 0.75rem;
            font-family: 'JetBrains Mono', monospace;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .item-date {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: var(--gray);
            margin-top: 0.5rem;
        }

        .delete-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 30px;
            height: 30px;
            background: var(--red);
            border: none;
            color: white;
            border-radius: 4px;
            cursor: pointer;
            opacity: 0;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .item-card:hover .delete-btn {
            opacity: 1;
        }

        .delete-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 20px var(--red);
        }

        /* Reviews */
        .review-item {
            background: var(--elevated);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 6px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: start;
            gap: 2rem;
        }

        .review-content h4 {
            color: var(--gold);
            margin-bottom: 0.3rem;
            font-size: 1.1rem;
        }

        .review-stars {
            color: var(--gold);
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }

        .review-text {
            color: #aaa;
            line-height: 1.5;
        }

        .review-meta {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: var(--gray);
            margin-top: 0.5rem;
        }

        .del-review-btn {
            background: transparent;
            border: 1px solid var(--red);
            color: var(--red);
            padding: 0.5rem 1rem;
            cursor: pointer;
            font-size: 0.8rem;
            border-radius: 4px;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .del-review-btn:hover {
            background: var(--red);
            color: white;
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--elevated);
            border: 1px solid var(--green);
            color: var(--green);
            padding: 1rem 2rem;
            border-radius: 6px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            display: none;
            z-index: 1000;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            animation: slideUp 0.3s;
        }

        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .checkbox-wrapper {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--gray);
            font-size: 0.85rem;
            cursor: pointer;
        }

        .checkbox-wrapper input[type="checkbox"] {
            accent-color: var(--gold);
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .upload-grid { grid-template-columns: 1fr; }
            .dash-meta { gap: 1rem; }
            .tabs { overflow-x: auto; }
            .input-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div id="loginScreen" class="login-screen">
        <div class="terminal-box">
            <div class="terminal-header">
                <div class="terminal-dot dot-red"></div>
                <div class="terminal-dot dot-yellow"></div>
                <div class="terminal-dot dot-green"></div>
                <span class="terminal-title">root@suxy:~</span>
            </div>
            <h2>Developer Access Portal</h2>
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="input-group">
                    <label>Username</label>
                    <input type="text" id="username" class="terminal-input" placeholder="Enter username..." required autocomplete="off">
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="password" class="terminal-input" placeholder="Enter password..." required>
                </div>
                <button type="submit" class="terminal-btn">Authenticate</button>
                <div id="errorMsg" class="error-msg">Access Denied: Invalid Credentials</div>
            </form>
            <a href="index.html" class="back-link">← Return to Main Site</a>
        </div>
    </div>

    <div id="dashboard" class="dashboard">
        <header class="dash-header">
            <div class="dash-brand">SUXY Developer Console</div>
            <div class="dash-meta">
                <div class="status-indicator">
                    <div class="status-dot"></div>
                    <span>System Online</span>
                </div>
                <button class="logout-btn" onclick="logout()">Terminate Session</button>
            </div>
        </header>

        <div class="dash-content">
            <div class="tabs">
                <button class="tab active" onclick="switchTab('upload', this)">Upload Inventory</button>
                <button class="tab" onclick="switchTab('manage', this)">Manage Items</button>
                <button class="tab" onclick="switchTab('reviews', this)">Moderate Reviews</button>
            </div>

            <div id="uploadTab" class="tab-content active">
                <div class="upload-grid" id="uploadGrid"></div>
            </div>

            <div id="manageTab" class="tab-content">
                <div id="itemsList" class="items-grid"></div>
            </div>

            <div id="reviewsTab" class="tab-content">
                <div id="reviewsList"></div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast">Operation Successful</div>

    <script>
        const CREDENTIALS = [
            { username: '07044696807', password: 'SRW1' },
            { username: '07012305403', password: 'SRW1' }
        ];

        window.onload = () => {
            if (sessionStorage.getItem('suxy_auth') === 'true') {
                showDashboard();
            }
            // Check for expired items on load
            checkExpiredItems();
        };

        function handleLogin(e) {
            e.preventDefault();
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            
            const valid = CREDENTIALS.some(c => c.username === u && c.password === p);
            
            if (valid) {
                sessionStorage.setItem('suxy_auth', 'true');
                showDashboard();
            } else {
                const err = document.getElementById('errorMsg');
                err.style.display = 'block';
                setTimeout(() => err.style.display = 'none', 3000);
            }
        }

        function showDashboard() {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            initUploadSlots();
            loadItems();
            loadReviews();
        }

        function logout() {
            sessionStorage.removeItem('suxy_auth');
            window.location.reload();
        }

        function switchTab(tab, btn) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            
            btn.classList.add('active');
            document.getElementById(tab + 'Tab').classList.add('active');
            
            if (tab === 'manage') loadItems();
            if (tab === 'reviews') loadReviews();
        }

        function checkExpiredItems() {
            let items = JSON.parse(localStorage.getItem('suxy_items') || '[]');
            const now = new Date().getTime();
            const validItems = items.filter(item => {
                if (item.deleteAt) {
                    return new Date(item.deleteAt).getTime() > now;
                }
                return true;
            });
            if (validItems.length !== items.length) {
                localStorage.setItem('suxy_items', JSON.stringify(validItems));
                console.log('Expired items cleaned up');
            }
        }

        function initUploadSlots() {
            const grid = document.getElementById('uploadGrid');
            grid.innerHTML = '';
            
            for (let i = 1; i <= 10; i++) {
                const card = document.createElement('div');
                card.className = 'upload-card';
                card.setAttribute('data-slot', `Slot ${i}`);
                card.innerHTML = `
                    <div class="drop-zone" onclick="document.getElementById('file${i}').click()" id="drop${i}">
                        <input type="file" id="file${i}" accept="image/*" onchange="handleFile(${i})">
                        <svg class="drop-icon" viewBox="0 0 24 24">
                            <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
                            <polyline points="17 8 12 3 7 8"/>
                            <line x1="12" y1="3" x2="12" y2="15"/>
                        </svg>
                        <span class="drop-text" id="text${i}">Drop image or click to browse</span>
                        <img id="preview${i}" class="preview-img" style="display: none;">
                    </div>
                    <input type="text" id="name${i}" class="upload-input" placeholder="Product name..." oninput="validateSlot(${i})">
                    <div class="input-row">
                        <input type="number" id="price${i}" class="upload-input" placeholder="Price (₦)..." oninput="validateSlot(${i})">
                        <input type="text" id="desc${i}" class="upload-input" placeholder="Short description..." oninput="validateSlot(${i})">
                    </div>
                    <div class="schedule-section">
                        <label class="schedule-toggle">
                            <input type="checkbox" id="scheduleCheck${i}" onchange="toggleSchedule(${i})">
                            <span>Schedule auto-delete</span>
                        </label>
                        <div class="schedule-datetime" id="scheduleBox${i}">
                            <input type="datetime-local" id="deleteAt${i}" class="upload-input" oninput="validateSlot(${i})">
                        </div>
                    </div>
                    <button class="upload-btn" id="btn${i}" onclick="uploadItem(${i})" disabled>Upload to Store</button>
                `;
                grid.appendChild(card);
            }
        }

        function toggleSchedule(slot) {
            const checkbox = document.getElementById(`scheduleCheck${slot}`);
            const scheduleBox = document.getElementById(`scheduleBox${slot}`);
            const deleteAtInput = document.getElementById(`deleteAt${slot}`);
            
            if (checkbox.checked) {
                scheduleBox.classList.add('active');
                // Set default to 7 days from now
                const future = new Date();
                future.setDate(future.getDate() + 7);
                future.setMinutes(future.getMinutes() - future.getTimezoneOffset());
                deleteAtInput.value = future.toISOString().slice(0, 16);
            } else {
                scheduleBox.classList.remove('active');
                deleteAtInput.value = '';
            }
            validateSlot(slot);
        }

        function handleFile(slot) {
            const input = document.getElementById(`file${slot}`);
            const preview = document.getElementById(`preview${slot}`);
            const dropZone = document.getElementById(`drop${slot}`);
            const text = dropZone.querySelector('.drop-text');
            const icon = dropZone.querySelector('.drop-icon');
            
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                    text.style.display = 'none';
                    icon.style.display = 'none';
                    dropZone.classList.add('has-image');
                    validateSlot(slot);
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function validateSlot(slot) {
            const hasFile = document.getElementById(`file${slot}`).files.length > 0;
            const hasName = document.getElementById(`name${slot}`).value.trim() !== '';
            const scheduleEnabled = document.getElementById(`scheduleCheck${slot}`).checked;
            const hasSchedule = scheduleEnabled ? document.getElementById(`deleteAt${slot}`).value !== '' : true;
            
            document.getElementById(`btn${slot}`).disabled = !(hasFile && hasName && hasSchedule);
        }

        function uploadItem(slot) {
            const file = document.getElementById(`file${slot}`).files[0];
            const name = document.getElementById(`name${slot}`).value.trim();
            const price = document.getElementById(`price${slot}`).value.trim();
            const description = document.getElementById(`desc${slot}`).value.trim();
            const preview = document.getElementById(`preview${slot}`).src;
            const scheduleEnabled = document.getElementById(`scheduleCheck${slot}`).checked;
            const deleteAt = scheduleEnabled ? document.getElementById(`deleteAt${slot}`).value : null;
            
            const item = {
                id: Date.now().toString() + slot,
                name: name,
                price: price,
                description: description,
                image: preview,
                added: new Date().toISOString(),
                deleteAt: deleteAt
            };
            
            const items = JSON.parse(localStorage.getItem('suxy_items') || '[]');
            items.push(item);
            localStorage.setItem('suxy_items', JSON.stringify(items));
            
            // Reset form
            document.getElementById(`file${slot}`).value = '';
            document.getElementById(`name${slot}`).value = '';
            document.getElementById(`price${slot}`).value = '';
            document.getElementById(`desc${slot}`).value = '';
            document.getElementById(`scheduleCheck${slot}`).checked = false;
            document.getElementById(`deleteAt${slot}`).value = '';
            document.getElementById(`scheduleBox${slot}`).classList.remove('active');
            document.getElementById(`preview${slot}`).style.display = 'none';
            document.getElementById(`drop${slot}`).classList.remove('has-image');
            document.getElementById(`drop${slot}`).querySelector('.drop-text').style.display = 'block';
            document.getElementById(`drop${slot}`).querySelector('.drop-icon').style.display = 'block';
            document.getElementById(`btn${slot}`).disabled = true;
            
            showToast('✓ Item uploaded successfully');
        }

        function loadItems() {
            checkExpiredItems();
            const items = JSON.parse(localStorage.getItem('suxy_items') || '[]');
            const list = document.getElementById('itemsList');
            
            if (items.length === 0) {
                list.innerHTML = '<p style="color: var(--gray); text-align: center; padding: 3rem;">No items in inventory</p>';
                return;
            }
            
            list.innerHTML = items.map(item => {
                let expiryHtml = '';
                if (item.deleteAt) {
                    const expiryDate = new Date(item.deleteAt);
                    const now = new Date();
                    const daysLeft = Math.ceil((expiryDate - now) / (1000 * 60 * 60 * 24));
                    expiryHtml = `<div class="item-expiry">⏱ Expires in ${daysLeft} day${daysLeft !== 1 ? 's' : ''}</div>`;
                }
                
                return `
                    <div class="item-card">
                        <button class="delete-btn" onclick="deleteItem('${item.id}')">×</button>
                        <img src="${item.image}" alt="${item.name}">
                        <div class="item-info">
                            <div class="item-title">${item.name}</div>
                            ${item.price ? `<div class="item-price">₦${parseInt(item.price).toLocaleString()}</div>` : ''}
                            ${item.description ? `<div class="item-desc">${item.description}</div>` : ''}
                            ${expiryHtml}
                            <div class="item-date">Added: ${new Date(item.added).toLocaleDateString()}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function deleteItem(id) {
            if (!confirm('Delete this item permanently?')) return;
            let items = JSON.parse(localStorage.getItem('suxy_items') || '[]');
            items = items.filter(i => i.id !== id);
            localStorage.setItem('suxy_items', JSON.stringify(items));
            loadItems();
            showToast('✓ Item deleted');
        }

        function loadReviews() {
            const reviews = JSON.parse(localStorage.getItem('suxy_reviews') || '[]');
            const list = document.getElementById('reviewsList');
            
            if (reviews.length === 0) {
                list.innerHTML = '<p style="color: var(--gray); text-align: center; padding: 3rem;">No reviews to moderate</p>';
                return;
            }
            
            reviews.sort((a, b) => new Date(b.date) - new Date(a.date));
            
            list.innerHTML = reviews.map(r => `
                <div class="review-item">
                    <div class="review-content">
                        <h4>${r.name}</h4>
                        <div class="review-stars">${'★'.repeat(r.rating)}${'☆'.repeat(5-r.rating)}</div>
                        <div class="review-text">${r.text}</div>
                        <div class="review-meta">${new Date(r.date).toLocaleString()}</div>
                    </div>
                    <button class="del-review-btn" onclick="deleteReview(${r.id})">Remove</button>
                </div>
            `).join('');
        }

        function deleteReview(id) {
            if (!confirm('Remove this review?')) return;
            let reviews = JSON.parse(localStorage.getItem('suxy_reviews') || '[]');
            reviews = reviews.filter(r => r.id !== id);
            localStorage.setItem('suxy_reviews', JSON.stringify(reviews));
            loadReviews();
            showToast('✓ Review removed');
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 3000);
        }
    </script>
</body>
</html>
