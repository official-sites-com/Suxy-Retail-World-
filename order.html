<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUXY Retail World | Order</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0a; color: #f5f5f0; font-family: 'Segoe UI', sans-serif; line-height: 1.6; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 15px; }
        nav { background: rgba(26,26,26,0.95); padding: 15px 0; position: fixed; width: 100%; top: 0; z-index: 1000; border-bottom: 1px solid #d4af37; }
        .nav-flex { display: flex; justify-content: space-between; align-items: center; }
        .logo { font-family: Georgia, serif; color: #d4af37; font-size: 24px; font-weight: bold; text-decoration: none; }
        .logo span { color: #fff; font-size: 12px; display: block; font-family: sans-serif; letter-spacing: 2px; }
        .nav-links { display: flex; gap: 30px; }
        .nav-links a { color: #ccc; text-decoration: none; font-size: 14px; text-transform: uppercase; }
        .nav-links a.active { color: #d4af37; }
        .mobile-menu-btn { display: none; background: none; border: none; color: #fff; font-size: 20px; }
        main { padding-top: 100px; min-height: 100vh; padding-bottom: 100px; }
        .page-title { font-family: Georgia, serif; font-size: 36px; text-align: center; margin-bottom: 10px; color: #fff; }
        .page-subtitle { text-align: center; color: #999; margin-bottom: 40px; }
        .filters { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-bottom: 40px; }
        .filter-btn { padding: 8px 20px; background: transparent; border: 1px solid #444; color: #999; border-radius: 20px; cursor: pointer; font-size: 14px; transition: all 0.3s; }
        .filter-btn:hover, .filter-btn.active { border-color: #d4af37; color: #d4af37; background: rgba(212, 175, 55, 0.1); }
        .items-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; }
        .item-card { background: #1a1a1a; border-radius: 10px; overflow: hidden; border: 1px solid #333; cursor: pointer; transition: all 0.3s; position: relative; }
        .item-card:hover { transform: translateY(-5px); border-color: #555; }
        .item-card.selected { border: 2px solid #d4af37; }
        .item-card.selected::after { content: '✓'; position: absolute; top: 10px; right: 10px; background: #d4af37; color: #000; width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .item-image { height: 250px; overflow: hidden; }
        .item-image img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s; }
        .item-card:hover .item-image img { transform: scale(1.1); }
        .item-info { padding: 20px; }
        .item-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
        .item-name { font-family: Georgia, serif; font-size: 18px; color: #fff; flex: 1; padding-right: 10px; }
        .item-price { color: #d4af37; font-weight: bold; font-size: 16px; }
        .item-desc { color: #888; font-size: 14px; line-height: 1.5; margin-bottom: 15px; height: 40px; overflow: hidden; }
        .item-meta { display: flex; justify-content: space-between; align-items: center; }
        .item-category { font-size: 11px; text-transform: uppercase; color: #666; background: #0a0a0a; padding: 5px 10px; border-radius: 3px; }
        .item-status { font-size: 12px; color: #d4af37; }
        .empty-state { text-align: center; padding: 80px 20px; color: #666; grid-column: 1/-1; }
        .empty-state i { font-size: 64px; margin-bottom: 20px; color: #333; }
        .floating-cart { position: fixed; bottom: 30px; right: 30px; z-index: 100; }
        .floating-cart a { display: flex; align-items: center; gap: 10px; background: #d4af37; color: #000; padding: 15px 30px; border-radius: 50px; text-decoration: none; font-weight: bold; animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 20%, 50%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-10px); } 60% { transform: translateY(-5px); } }
        .floating-cart.hidden { display: none; }
        .loading { display: flex; justify-content: center; padding: 100px; }
        .spinner { width: 50px; height: 50px; border: 3px solid #333; border-top-color: #d4af37; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        footer { background: #000; padding: 40px 0; text-align: center; border-top: 1px solid #333; }
        .social-links { display: flex; justify-content: center; gap: 30px; margin-bottom: 20px; }
        .social-links a { color: #666; font-size: 24px; text-decoration: none; }
        @media (max-width: 768px) { .nav-links { display: none; } .mobile-menu-btn { display: block; } .page-title { font-size: 28px; } .items-grid { grid-template-columns: 1fr; } }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<nav>
    <div class="container nav-flex">
        <a href="index.html" class="logo">SUXY<span>Retail World</span></a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="order.html" class="active">Order</a>
            <a href="purchase.html">Purchase <span id="cartBadge" style="background: #d4af37; color: #000; padding: 2px 8px; border-radius: 10px; font-size: 12px; margin-left: 5px; opacity: 0;">0</span></a>
        </div>
        <button class="mobile-menu-btn" onclick="toggleMobileMenu()"><i class="fas fa-bars"></i></button>
    </div>
    <div id="mobileMenu" style="display: none; padding: 20px; background: #1a1a1a;">
        <a href="index.html" style="display: block; color: #ccc; padding: 10px 0;">Home</a>
        <a href="order.html" style="display: block; color: #d4af37; padding: 10px 0;">Order</a>
        <a href="purchase.html" style="display: block; color: #ccc; padding: 10px 0;">Purchase</a>
    </div>
</nav>

<main class="container">
    <h1 class="page-title">AVAILABLE ITEMS</h1>
    <p class="page-subtitle">A refined collection, selected with intention, made just for you.<br>Click to select items for Purchase.</p>
    
    <div class="filters">
        <button class="filter-btn active" onclick="filterItems('all')">All</button>
        <button class="filter-btn" onclick="filterItems('clothing')">Clothing</button>
        <button class="filter-btn" onclick="filterItems('footwear')">Footwear</button>
        <button class="filter-btn" onclick="filterItems('bags')">Bags</button>
        <button class="filter-btn" onclick="filterItems('accessories')">Accessories</button>
        <button class="filter-btn" onclick="filterItems('household')">Household</button>
        <button class="filter-btn" onclick="filterItems('varieties')">Varieties</button>
    </div>
    
    <div id="itemsContainer" class="items-grid">
        <div class="loading"><div class="spinner"></div></div>
    </div>
    
    <div id="floatingCart" class="floating-cart hidden">
        <a href="purchase.html"><span>Review Order</span><span id="cartCount">0</span><i class="fas fa-arrow-right"></i></a>
    </div>
</main>

<footer>
    <div class="social-links">
        <a href="https://wa.me/2347012305403" style="color: #25d366;"><i class="fab fa-whatsapp"></i></a>
        <a href="#" style="color: #ff0050;"><i class="fab fa-tiktok"></i></a>
        <a href="tel:+2347012305403" style="color: #007bff;"><i class="fas fa-phone"></i></a>
    </div>
    <p style="color: #666; font-size: 14px;">&copy; 2026 SUXY Retail World</p>
</footer>

<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

<script>
const _0xf1=["\x41\x49\x7a\x61\x53\x79\x41\x4f\x6f\x4d\x65\x79\x48\x31\x51\x4b\x4d\x4e\x68\x4a\x36\x49\x43\x66\x65\x4c\x6f\x32\x6b\x45\x46\x65\x65\x59\x54\x45\x46\x63\x67","\x73\x75\x78\x79\x72\x65\x74\x61\x69\x6c\x77\x6f\x72\x6c\x64\x2e\x66\x69\x72\x65\x62\x61\x73\x65\x61\x70\x70\x2e\x63\x6f\x6d","\x73\x75\x78\x79\x72\x65\x74\x61\x69\x6c\x77\x6f\x72\x6c\x64","\x73\x75\x78\x79\x72\x65\x74\x61\x69\x6c\x77\x6f\x72\x6c\x64\x2e\x66\x69\x72\x65\x62\x61\x73\x65\x73\x74\x6f\x72\x61\x67\x65\x2e\x61\x70\x70","\x36\x31\x35\x38\x36\x33\x35\x37\x30\x39\x30\x39","\x31\x3a\x36\x31\x35\x38\x36\x33\x35\x37\x30\x39\x30\x39\x3a\x77\x65\x62\x3a\x37\x39\x66\x36\x36\x61\x30\x34\x65\x63\x36\x30\x63\x39\x38\x34\x35\x62\x32\x36\x33\x34"];
const firebaseConfig={apiKey:_0xf1[0],authDomain:_0xf1[1],projectId:_0xf1[2],storageBucket:_0xf1[3],messagingSenderId:_0xf1[4],appId:_0xf1[5]};

let db;
let allItems = [];
let cart = JSON.parse(localStorage.getItem('suxy_cart')) || [];
let currentFilter = 'all';

document.addEventListener('DOMContentLoaded', () => {
    const urlParams = new URLSearchParams(window.location.search);
    const cat = urlParams.get('cat');
    if (cat) {
        currentFilter = cat;
        updateFilterButtons();
    }
    
    try {
        firebase.initializeApp(firebaseConfig);
        db = firebase.firestore();
        
        db.collection('items').onSnapshot(() => loadItems());
    } catch (e) {
        console.error('Firebase error:', e);
        document.getElementById('itemsContainer').innerHTML = '<div class="empty-state"><p>Database connection failed</p></div>';
    }
    
    loadItems();
    updateCartUI();
});

async function loadItems() {
    if (!db) return;
    try {
        const snapshot = await db.collection('items').get();
        allItems = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        renderItems();
    } catch (e) {
        console.error('Load error:', e);
    }
}

function renderItems() {
    const container = document.getElementById('itemsContainer');
    const now = new Date();
    
    let filtered = allItems.filter(item => {
        if (currentFilter !== 'all' && item.category !== currentFilter) return false;
        if (item.expiry && new Date(item.expiry) < now) return false;
        return true;
    });
    
    if (filtered.length === 0) {
        container.innerHTML = '<div class="empty-state" style="grid-column: 1/-1;"><i class="fas fa-box-open"></i><h3>No items available</h3><p>Check back soon for new arrivals</p></div>';
        return;
    }
    
    container.innerHTML = filtered.map(item => {
        const isSelected = cart.find(c => c.id === item.id);
        return `
            <div class="item-card ${isSelected ? 'selected' : ''}" onclick="toggleCart('${item.id}')">
                <div class="item-image"><img src="${item.imageUrl}" alt="${item.name}" loading="lazy"></div>
                <div class="item-info">
                    <div class="item-header">
                        <h3 class="item-name">${item.name}</h3>
                        <span class="item-price">₦${item.price}</span>
                    </div>
                    <p class="item-desc">${item.description || 'Premium quality item'}</p>
                    <div class="item-meta">
                        <span class="item-category">${item.category}</span>
                        <span class="item-status">${isSelected ? 'Selected' : 'Click to Select'}</span>
                    </div>
                </div>
            </div>
        `;
    }).join('');
}

function toggleCart(id) {
    const idx = cart.findIndex(c => c.id === id);
    if (idx > -1) {
        cart.splice(idx, 1);
    } else {
        const item = allItems.find(i => i.id === id);
        if (item) cart.push(item);
    }
    saveCart();
    renderItems();
    updateCartUI();
}

function saveCart() {
    localStorage.setItem('suxy_cart', JSON.stringify(cart));
}

function updateCartUI() {
    const count = cart.length;
    document.getElementById('cartCount').textContent = count;
    document.getElementById('cartBadge').textContent = count;
    document.getElementById('cartBadge').style.opacity = count > 0 ? '1' : '0';
    document.getElementById('floatingCart').classList.toggle('hidden', count === 0);
}

function filterItems(cat) {
    currentFilter = cat;
    updateFilterButtons();
    renderItems();
    const url = new URL(window.location);
    if (cat === 'all') url.searchParams.delete('cat');
    else url.searchParams.set('cat', cat);
    window.history.pushState({}, '', url);
}

function updateFilterButtons() {
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.classList.remove('active');
        if (btn.textContent.toLowerCase().includes(currentFilter) || (currentFilter === 'all' && btn.textContent === 'All')) {
            btn.classList.add('active');
        }
    });
}

function toggleMobileMenu() {
    const menu = document.getElementById('mobileMenu');
    menu.style.display = menu.style.display === 'none' ? 'block' : 'none';
}
</script>

</body>
</html>
