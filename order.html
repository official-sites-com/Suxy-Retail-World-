<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collection | SUXY Retail World</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --deep-black: #050505; --charcoal: #0a0a0a; --elevated: #151515; --surface: #1a1a1a;
            --gold: #c9a961; --gold-bright: #e0c078; --coral: #d4a594;
            --white: #ffffff; --gray-light: #a0a0a0; --gray-dark: #505050;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--deep-black);
            color: var(--white); line-height: 1.6;
        }
        .bg-mesh {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background: radial-gradient(circle at 20% 50%, rgba(201, 169, 97, 0.05) 0%, transparent 50%), radial-gradient(circle at 80% 80%, rgba(212, 165, 148, 0.03) 0%, transparent 50%);
        }
        nav {
            background: rgba(5,5,5,0.95); backdrop-filter: blur(20px); padding: 1.5rem 5%;
            border-bottom: 1px solid rgba(255,255,255,0.05); position: sticky; top: 0; z-index: 1000;
        }
        .nav-content {
            max-width: 1400px; margin: 0 auto;
            display: flex; justify-content: space-between; align-items: center;
        }
        .brand {
            font-family: 'Playfair Display', serif; font-size: 1.8rem;
            color: var(--gold); text-decoration: none; cursor: pointer; letter-spacing: 3px; transition: opacity 0.3s;
        }
        .brand:hover { opacity: 0.8; }
        .nav-links {
            display: flex; gap: 2.5rem; list-style: none;
        }
        .nav-links a {
            color: var(--gray-light); text-decoration: none; text-transform: uppercase;
            font-size: 0.8rem; letter-spacing: 2px; transition: color 0.3s; font-weight: 500;
        }
        .nav-links a:hover, .nav-links a.active { color: var(--gold); }
        .container {
            max-width: 1400px; margin: 0 auto;
            padding: 4rem 5%;
        }
        .page-header {
            margin-bottom: 4rem; text-align: center;
        }
        .page-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.5rem, 5vw, 4rem);
            font-weight: 400; margin-bottom: 1rem;
            background: linear-gradient(135deg, var(--white) 0%, var(--gold) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .page-header p {
            color: var(--gray-light); font-size: 1.1rem; max-width: 600px; margin: 0 auto;
        }
        .marketplace {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 2.5rem;
        }
        .item-card {
            background: var(--elevated); border-radius: 8px; overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05); transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            cursor: pointer; position: relative; group: card;
        }
        .Item-card:hover {
            transform: translateY(-8px); border-color: rgba(201,169,97,0.2);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }
        .image-container {
            position: relative; height: 400px; overflow: hidden;
            background: linear-gradient(135deg, #1a1a1a 0%, #0f0f0f 100%);
        }
        .Image-container img {
            width: 100%; height: 100%; object-fit: cover; transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .Item-card:hover .Image-container img { transform: scale(1.08); }
        .Image-overlay {
            position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            opacity: 0; transition: opacity 0.3s; display: flex; align-items: flex-end; justify-content: center;
            padding-bottom: 2rem;
        }
        .Item-card:hover .Image-overlay { opacity: 1; }
        .quick-select {
            background: var(--gold); color: var(--deep-black); border: none; padding: 1rem 2rem;
            font-weight: 600; text-transform: uppercase; letter-spacing: 1px; cursor: pointer;
            transform: translateY(20px); opacity: 0; transition: all 0.3s; border-radius: 2px;
        }
        .Item-card:hover .quick-select { transform: translateY(0); opacity: 1; }
        .quick-select:hover { background: var(--gold-bright); }
        .Item-details { padding: 1.5rem; position: relative; }
        .Item-name {
            font-family: 'Playfair Display', serif; font-size: 1.3rem; color: var(--white); margin-bottom: 0.5rem; text-transform: capitalize;
        }
        .Item-category {
            color: var(--gray-dark); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px;
        }
        .selection-indicator {
            position: absolute; top: 1.5rem; right: 1.5rem; width: 24px; height: 24px;
            border: 2px solid var(--gray-dark); border-radius: 50%; transition: all 0.3s;
            display: flex; align-items: center; justify-content: center;
        }
        .Item-card.selected .selection-indicator { background: var(--gold); border-color: var(--gold); }
        .Item-card.selected .selection-indicator::after { content: '✓'; color: var(--deep-black); font-weight: bold; font-size: 0.8rem; }
        .Item-card.selected { border-color: var(--gold); box-shadow: 0 0 30px rgba(201,169,97,0.1); }
        .fab {
            position: fixed; bottom: 2rem; right: 2rem; background: var(--gold); color: var(--deep-black);
            padding: 1.2rem 2.5rem; border-radius: 50px; text-decoration: none; font-weight: 600; letter-spacing: 1px;
            box-shadow: 0 10px 40px rgba(201,169,97,0.3); transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 999; display: flex; align-items: center; gap: 0.8rem; border: none; cursor: pointer; font-size: 0.9rem; text-transform: uppercase;
        }
        .fab:hover { transform: translateY(-3px) scale(1.05); box-shadow: 0 20px 60px rgba(201,169,97,0.4); }
        .fab-count {
            background: var(--deep-black); color: var(--gold); width: 28px; height: 28px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-size: 0.85rem; font-weight: 700;
        }
        .empty-state {
            grid-column: 1 / -1; text-align: center; padding: 6rem 2rem; color: var(--gray-dark);
        }
        .empty-state h3 {
            font-family: 'Playfair Display', serif; font-size: 2rem; color: var(--white); margin-bottom: 1rem;
        }
        /* Expiration Badge */
        .expiry-badge {
            position: absolute; top: 10px; left: 10px; background: rgba(255,68,68,0.9); color: white;
            padding: 0.3rem 0.8rem; border-radius: 4px; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px;
            z-index: 10;
        }
        .expiry-badge.expired { background: var(--gold); }
        @media (max-width: 768px) {
            .marketplace { grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 1.5rem; }
            .Image-container { height: 300px; }
            .nav-links { display: none; }
        }
    </style>
</head>
<body>
    <div class="bg-mesh"></div>
    
    <nav>
        <div class="nav-content">
            <a href="index.html" class="brand">SUXY</a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="order.html" class="active">Collection</a></li>
                <li><a href="Purchase.html">Checkout</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <!-- UPDATED HEADER TEXT -->
            <h1>Available Items</h1>
            <p>A refined collection, selected with intention, made just for you.<br>Click to select items for Purchase.</p>
        </div>

        <div id="marketplace" class="marketplace">
            <div class="empty-state">
                <h3>Loading Collection...</h3>
                <p>New arrivals coming soon</p>
            </div>
        </div>
    </div>

    <button class="fab" id="cartFab" onclick="goToCheckout()" style="display: none;">
        <span>Checkout</span>
        <span class="fab-Count" id="fabCount">0</span>
    </button>

    <script>
        // Initialize session ID for tracking ordered Items
        if (!sessionStorage.getItem('suxy_session_id')) {
            sessionStorage.setItem('suxy_session_id', Date.now().toString() + '_' + Math.random().toString(36).substr(2, 9));
        }
        
        const SESSION_ID = sessionStorage.getItem('suxy_session_id');
        let selectedItems = new Set();

        function LoadItems() {
            const Items = JSON.parse(localStorage.getItem('suxy_Items') || '[]');
            const container = document.getElementById('marketplace');
            const now = new Date().getTime();
            
            // Filter: Get only non-expired Items not ordered by this session
            const VisibleItems = Items.filter(Item => {
                // Check if expired
                if (Item.expires && now > Item.expires) return false;
                // Check if already ordered by this session
                if (Item.orderedBy && Item.orderedBy.includes(SESSION_ID)) return false;
                return true;
            });
            
            if (VisibleItems.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <h3>No Items Available</h3>
                        <p>Our collection is currently being curated. Please check back later.</p>
                    </div>
                `;
                return;
            }
            
            // Sort by newest first
            VisibleItems.sort((a, b) => new Date(b.added) - new Date(a.added));
            
            Container.innerHTML = VisibleItems.map(Item => {
                const isExpired = Item.expires && now > Item.expires;
                const IsOrdered = Item.orderedBy && Item.orderedBy.includes(SESSION_ID);
                const ExpiryText = Item.expires ? new Date(Item.expires).toLocaleString() : '';
                
                return `
                    <div class="Item-card ${selectedItems.has(Item.id) ? 'selected' : ''}" 
                         onclick="toggleItem('${Item.id}')" data-id="${Item.id}">
                        <div class="Image-container">
                            <img src="${Item.Image}" alt="${Item.name}" 
                                 onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22400%22 height=%22400%22><rect width=%22400%22 height=%22400%22 fill=%22%23111%22/><text x=%2250%%22 y=%2250%%22 font-family=%22sans-serif%22 font-size=%2220%22 fill=%22%23555%22 text-anchor=%22middle%22 dominant-baseline=%22middle%22>NO IMAGE</text></svg>'">
                            ${Item.expires ? `<div class="expiry-badge ${IsExpired ? 'expired' : ''}">${IsExpired ? 'EXPIRED' : 'Expires: ' + ExpiryText}</div>` : ''}
                            <div class="Image-overlay">
                                <button class="quick-select" onclick="event.stopPropagation(); toggleItem('${Item.id}')">
                                    ${selectedItems.has(Item.id) ? 'Selected' : 'Select Item'}
                                </button>
                            </div>
                        </div>
                        <div class="Item-details">
                            <h3 class="Item-name">${Item.name}</h3>
                            <span class="Item-category">Luxury Collection</span>
                            <div class="selection-indicator"></div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        Function toggleItem(id) {
            const card = document.querySelector(`[data-id="${id}"]`);
            
            if (selectedItems.has(id)) {
                selectedItems.delete(id);
                card.classList.remove('selected');
            } else {
                // Check if already ordered
                const Items = JSON.parse(localStorage.getItem('suxy_Items') || '[]');
                const Item = Items.find(i => i.id === id);
                if (Item && Item.orderedBy && Item.orderedBy.includes(SESSION_ID)) {
                    alert('This Item has already been ordered and is no longer available.');
                    return;
                }
                selectedItems.add(id);
                Card.classList.add('selected');
            }
            
            updateCart();
        }

        Function updateCart() {
            const fab = document.getElementById('cartFab');
            const Count = document.getElementById('fabCount');
            
            If (selectedItems.size > 0) {
                fab.style.display = 'flex';
                Count.textContent = selectedItems.size;
                sessionStorage.setItem('suxy_selection', JSON.stringify([...selectedItems]));
            } Else {
                Fab.style.display = 'none';
                sessionStorage.removeItem('suxy_selection');
            }
            
            // Update button text in overlay
            document.querySelectorAll('.Item-card').forEach(card => {
                const id = Card.getAttribute('data-id');
                const btn = Card.querySelector('.quick-select');
                If (Btn) {
                    Btn.textContent = selectedItems.has(Id) ? 'Selected' : 'Select Item';
                }
            });
        }

        Function goToCheckout() {
            // Mark all selected Items as ordered by this session before navigating
            selectedItems.forEach(id => {
                markItemAsOrdered(Id);
            });
            Window.location.href = 'Purchase.html';
        }

        // NEW: Mark Item as ordered by current session
        Function markItemAsOrdered(ItemId) {
            Let Items = JSON.parse(localStorage.getItem('suxy_Items') || '[]');
            const Item = Items.find(i => i.id === ItemId);
            If (Item) {
                If (!Item.orderedBy) Item.orderedBy = [];
                If (!Item.orderedBy.includes(SESSION_ID)) {
                    Item.orderedBy.push(SESSION_ID);
                    localStorage.setItem('suxy_Items', JSON.stringify(Items));
                }
            }
        }

        Window.onload = LoadItems;
        Window.addEventListener('storage', LoadItems);
    </script>
</body>
</html>
