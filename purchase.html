<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | SUXY Retail World</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --deep-black: #050505; --charcoal: #0a0a0a; --elevated: #151515; --surface: #1f1f1f;
            --gold: #c9a961; --gold-bright: #e0c078; --coral: #d4a594;
            --white: #ffffff; --gray-light: #a0a0a0; --gray-dark: #505050;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--deep-black);
            color: var(--white); line-height: 1.6;
            background-image: radial-gradient(circle at 0% 0%, rgba(201,169,97,0.05) 0%, transparent 50%);
        }
        nav {
            background: rgba(5,5,5,0.95); backdrop-filter: blur(20px); padding: 1.5rem 5%;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .nav-content {
            max-width: 1400px; margin: 0 auto;
            display: flex; justify-content: space-between; align-items: center;
        }
        .brand {
            font-family: 'Playfair Display', serif; font-size: 1.8rem;
            color: var(--gold); text-decoration: none; cursor: pointer; letter-spacing: 3px; transition: opacity 0.3s;
        }
        .brand:hover { opacity: 0.8; }
        .Container {
            max-width: 1000px; margin: 0 auto; padding: 4rem 5%;
        }
        .page-title {
            font-family: 'Playfair Display', serif; font-size: 3rem;
            margin-bottom: 3rem; text-align: center; font-weight: 400;
        }
        .glass-card {
            background: rgba(255,255,255,0.03); backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.08); border-radius: 12px;
            padding: 2.5rem; margin-bottom: 2rem; position: relative; overflow: hidden;
        }
        .Glass-card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(201,169,97,0.3), transparent);
        }
        .section-title {
            font-size: 0.9rem; text-transform: uppercase; letter-spacing: 3px;
            color: var(--gold); margin-bottom: 1.5rem; font-weight: 600;
        }
        .Items-list { display: flex; flex-direction: column; gap: 1rem; }
        .Item-row {
            display: flex; align-items: center; gap: 1.5rem; padding: 1rem;
            background: rgba(0,0,0,0.2); border-radius: 8px; border: 1px solid rgba(255,255,255,0.05);
        }
        .Item-thumb {
            width: 80px; height: 80px; object-fit: cover; border-radius: 4px; border: 1px solid rgba(255,255,255,0.1);
        }
        .Item-info h4 {
            font-family: 'Playfair Display', serif; font-size: 1.1rem; font-weight: 400; margin-bottom: 0.3rem;
        }
        .Item-info p { color: var(--gray-dark); font-size: 0.9rem; }
        .empty-state {
            text-align: center; padding: 3rem; color: var(--gray-dark);
        }
        .empty-state a { color: var(--gold); text-decoration: none; border-bottom: 1px solid var(--gold); }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
        .form-group { display: flex; flex-direction: column; }
        .form-group.full-width { grid-column: 1 / -1; }
        .form-group label {
            font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px;
            color: var(--gray-light); margin-bottom: 0.5rem; font-weight: 500;
        }
        .form-group input, .form-group textarea {
            background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); padding: 1rem;
            color: var(--white); font-family: inherit; border-radius: 4px; transition: all 0.3s;
        }
        .form-group input:focus, .form-group textarea:focus {
            outline: none; border-color: var(--gold); background: rgba(0,0,0,0.5);
        }
        .form-group textarea { resize: vertical; min-height: 100px; }
        .actions { display: flex; flex-direction: column; gap: 1rem; margin-top: 2rem; }
        .btn {
            padding: 1.2rem; border: none; border-radius: 4px; font-weight: 600;
            text-transform: uppercase; letter-spacing: 2px; cursor: pointer;
            transition: all 0.3s; font-size: 0.9rem; text-align: center; text-decoration: none;
            display: flex; align-items: center; justify-content: center; gap: 0.8rem;
        }
        .btn-whatsapp { background: linear-gradient(135deg, #25D366, #128C7E); color: white; box-shadow: 0 10px 30px rgba(37, 211, 102, 0.2); }
        .btn-whatsapp:hover { transform: translateY(-2px); box-shadow: 0 15px 40px rgba(37, 211, 102, 0.3); }
        .btn-secondary { background: transparent; color: var(--white); border: 1px solid rgba(255,255,255,0.2); }
        .btn-secondary:hover { border-color: var(--gold); color: var(--gold); background: rgba(201,169,97,0.05); }
        .reviews-Container { margin-top: 4rem; }
        .review-card {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); border-radius: 8px;
            padding: 1.5rem; margin-bottom: 1rem; position: relative;
        }
        .review-header { display: flex; justify-content: space-between; align-items: start; margin-bottom: 0.5rem; }
        .reviewer-name { font-weight: 600; color: var(--gold); font-size: 1.1rem; }
        .review-date { font-size: 0.8rem; color: var(--gray-dark); }
        .stars { color: var(--gold); margin-bottom: 0.5rem; letter-spacing: 2px; }
        .review-text { color: var(--gray-light); line-height: 1.6; }
        .review-form { margin-top: 2rem; padding-top: 2rem; border-top: 1px solid rgba(255,255,255,0.1); }
        .star-rating { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
        .star-rating input { display: none; }
        .star-rating label { cursor: pointer; font-size: 1.5rem; color: var(--gray-dark); transition: color 0.2s; }
        .star-rating input:checked ~ label, .star-rating label:hover, .star-rating label:hover ~ label { color: var(--gold); }
        @media (max-width: 768px) {
            .form-grid { grid-template-columns: 1fr; }
            .page-title { font-size: 2rem; }
            .Glass-card { padding: 1.5rem; }
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-content">
            <a href="index.html" class="brand">SUXY</a>
            <div style="color: var(--gray-dark); font-size: 0.9rem;">Secure Checkout</div>
        </div>
    </nav>

    <div class="Container">
        <h1 class="page-title">Complete Your Order</h1>

        <div class="Glass-card">
            <h3 class="section-title">Selected Items</h3>
            <div id="selectedItems" class="Items-list">
                <div class="empty-state">
                    <p>No Items selected. <a href="Order.html">Browse Collection</a></p>
                </div>
            </div>
        </div>

        <div class="Glass-card">
            <h3 class="section-title">Delivery Details</h3>
            <form id="orderForm" class="form-grid">
                <div class="form-group">
                    <label>Full Name *</label>
                    <input type="text" id="fullName" required placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label>Phone Number *</label>
                    <input type="tel" id="phone" required placeholder="+234 701 230 5403">
                </div>
                <div class="form-group full-width">
                    <label>Delivery Address *</label>
                    <textarea id="address" required placeholder="Complete delivery address including city and state"></textarea>
                </div>
                <div class="form-group full-width">
                    <label>Special Instructions (Optional)</label>
                    <input type="text" id="notes" placeholder="Any specific delivery instructions...">
                </div>
            </form>

            <div class="actions">
                <button class="btn btn-whatsapp" onclick="SubmitOrder()">
                    <span>Complete Order via WhatsApp</span>
                </button>
                <a href="tel:+2347012305403" class="btn btn-secondary">
                    <span>Call to Order: +234 701 230 5403</span>
                </a>
            </div>
            
            <div Style="text-align: center; margin-top: 1.5rem;">
                <A href="https://www.tiktok.com/@suxy_retail_world" target="_blank" Style="color: var(--gray-light); text-decoration: none; font-size: 0.9rem; display: inline-flex; align-items: center; gap: 0.5rem;">
                    <span>Follow us on TikTok</span>
                    <span Style="color: var(--coral);">♪ @suxy_retail_world</span>
                </A>
            </div>
        </div>

        <div class="reviews-Container">
            <div class="Glass-card">
                <h3 class="section-title">Customer Reviews</h3>
                <div id="reviewsList"></div>

                <div class="review-form">
                    <h4 Style="margin-bottom: 1rem; color: var(--white);">Share Your Experience</h4>
                    <form id="reviewForm" onsubmit="SubmitReview(event)">
                        <div class="form-grid">
                            <div class="form-group">
                                <label>Your Name</label>
                                <input type="text" id="reviewName" required>
                            </div>
                            <div class="form-group">
                                <label>Rating</label>
                                <select id="reviewRating" Style="background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); padding: 1rem; color: var(--white); border-radius: 4px;">
                                    <option value="5">★★★★★ (5/5)</option>
                                    <option value="4">★★★★☆ (4/5)</option>
                                    <option value="3">★★★☆☆ (3/5)</option>
                                    <option value="2">★★☆☆☆ (2/5)</option>
                                    <option value="1">★☆☆☆☆ (1/5)</option>
                                </select>
                            </div>
                            <div class="form-group full-width">
                                <label>Your Review</label>
                                <textarea id="reviewText" rows="3" required placeholder="Tell us about your experience..."></textarea>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-secondary" Style="margin-top: 1rem; width: 100%;">Submit Review</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Initialize session ID
        if (!sessionStorage.getItem('suxy_session_id')) {
            sessionStorage.setItem('suxy_session_id', Date.now().toString() + '_' + Math.random().toString(36).substr(2, 9));
        }
        
        const SESSION_ID = sessionStorage.getItem('suxy_session_id');
        const DEFAULT_TTL = 24 * 60 * 60 * 1000; // 24 hours in ms

        function LoadSelectedItems() {
            const selectedIds = JSON.parse(sessionStorage.getItem('suxy_selection') || '[]');
            const allItems = JSON.parse(localStorage.getItem('suxy_Items') || '[]');
            const Container = document.getElementById('selectedItems');
            const now = new Date().getTime();
            
            // Filter out expired Items and already ordered Items
            const visibleItems = allItems.filter(item => {
                // Check if expired
                if (item.expires && now > item.expires) return false;
                // Check if already ordered by this session
                if (item.orderedBy && item.orderedBy.includes(SESSION_ID)) return false;
                return true;
            }).filter(id => selectedIds.includes(id));
            
            if (visibleItems.length === 0) {
                Container.innerHTML = `
                    <div class="empty-state">
                        <p>No Items selected. <a href="Order.html">Browse Collection</a></p>
                    </div>
                `;
                return;
            }
            
            Container.innerHTML = VisibleItems.map(item => `
                <div class="Item-row">
                    <img src="${item.Image}" alt="${EscapeHtml(item.name)}" class="Item-thumb" 
                         onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2280%22 height=%2280%22><rect width=%2280%22 height=%2280%22 fill=%22%23222%22/></svg>'">
                    <div class="Item-info">
                        <h4>${EscapeHtml(item.name)}</h4>
                        <p>Luxury Collection</p>
                    </div>
                </div>
            `).join('');
        }

        Function SubmitOrder() {
            const name = document.getElementById('fullName').value;
            const phone = document.getElementById('phone').value;
            const address = document.getElementById('address').value;
            
            If (!name || !phone || !address) {
                alert('Please fill in all required fields');
                return;
            }
            
            const selectedIds = JSON.parse(sessionStorage.getItem('suxy_selection') || '[]');
            const allItems = JSON.parse(localStorage.getItem('suxy_Items') || '[]');
            const selected = allItems.filter(item => selectedIds.includes(item.id));
            const notes = document.getElementById('notes').value;
            
            Let message = `*NEW ORDER - SUXY RETAIL WORLD*%0A%0A`;
            message += `*Customer:* ${name}%0A`;
            message += `*Phone:* ${phone}%0A`;
            message += `*Address:* ${address}%0A`;
            message += `*Items:*%0A`;
            selected.forEach((item, i) => {
                message += `${i + 1}. ${item.name}%0A`;
            });
            If (notes) message += `%0A*Notes:* ${notes}`;
            
            // Mark all selected Items as ordered
            selectedIds.forEach(id => markItemAsOrdered(id));
            
            Window.open(`https://wa.me/2347012305403?text=${message}`, '_blank');
        }

        Function markItemAsOrdered(ItemId) {
            Let Items = JSON.parse(localStorage.getItem('suxy_Items') || '[]');
            const Item = Items.find(i => i.id === ItemId);
            If (Item) {
                If (!Item.orderedBy) Item.orderedBy = [];
                If (!Item.orderedBy.includes(SESSION_ID)) {
                    Item.orderedBy.push(SESSION_ID);
                    localStorage.setItem('suxy_Items', JSON.stringify(Items));
                }
            }
        }

        Function LoadReviews() {
            const reviews = JSON.parse(localStorage.getItem('suxy_reviews') || '[]');
            const Container = document.getElementById('reviewsList');
            
            If (reviews.length === 0) {
                Container.innerHTML = '<p Style="color: var(--gray-dark); font-style: italic;">No reviews yet. Be the first!</p>';
                return;
            }
            
            reviews.sort((a, b) => new Date(b.date) - new Date(a.date));
            
            Container.innerHTML = reviews.map(r => `
                <div class="review-card">
                    <div class="review-header">
                        <div>
                            <div class="reviewer-name">${EscapeHtml(r.name)}</div>
                            <div class="stars">${'★'.repeat(r.rating)}${'☆'.repeat(5-r.rating)}</div>
                        </div>
                        <span class="review-date">${new Date(r.date).toLocaleDateString()}</span>
                    </div>
                    <div class="review-text">${EscapeHtml(r.text)}</div>
                </div>
            `).join('');
        }

        Function SubmitReview(e) {
            e.preventDefault();
            const review = {
                id: Date.now(),
                name: document.getElementById('reviewName').value,
                rating: parseInt(document.getElementById('reviewRating').value),
                text: document.getElementById('reviewText').value,
                date: new Date().toISOString()
            };
            
            const reviews = JSON.parse(localStorage.getItem('suxy_reviews') || '[]');
            reviews.push(review);
            localStorage.setItem('suxy_reviews', JSON.stringify(reviews));
            
            document.getElementById('reviewForm').reset();
            LoadReviews();
            
            const btn = e.target.querySelector('button[type="submit"]');
            const originalText = btn.textContent;
            btn.textContent = 'Review Submitted!';
            btn.Style.borderColor = '#25D366';
            btn.Style.color = '#25D366';
            SetTimeout(() => {
                btn.textContent = OriginalText;
                btn.Style.borderColor = '';
                btn.Style.color = '';
            }, 2000);
        }

        Function EscapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        Window.onload = () => {
            LoadSelectedItems();
            LoadReviews();
        };
    </script>
</body>
</html>
