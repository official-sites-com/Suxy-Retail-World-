<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUXY Retail World | Purchase</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0a; color: #f5f5f0; font-family: 'Segoe UI', sans-serif; line-height: 1.6; }
        .container { max-width: 1000px; margin: 0 auto; padding: 0 15px; }
        nav { background: rgba(26,26,26,0.95); padding: 15px 0; position: fixed; width: 100%; top: 0; z-index: 1000; border-bottom: 1px solid #d4af37; }
        .nav-flex { display: flex; justify-content: space-between; align-items: center; }
        .logo { font-family: Georgia, serif; color: #d4af37; font-size: 24px; font-weight: bold; text-decoration: none; }
        .logo span { color: #fff; font-size: 12px; display: block; font-family: sans-serif; letter-spacing: 2px; }
        .nav-links { display: flex; gap: 30px; }
        .nav-links a { color: #ccc; text-decoration: none; font-size: 14px; text-transform: uppercase; }
        .nav-links a.active { color: #d4af37; }
        .mobile-menu-btn { display: none; background: none; border: none; color: #fff; font-size: 20px; }
        main { padding-top: 100px; min-height: 100vh; padding-bottom: 60px; }
        .page-title { font-family: Georgia, serif; font-size: 32px; text-align: center; margin-bottom: 40px; color: #fff; }
        .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
        .box { background: #1a1a1a; border: 1px solid #333; border-radius: 10px; padding: 30px; }
        .box h2 { color: #d4af37; font-family: Georgia, serif; font-size: 20px; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid #333; }
        .cart-item { display: flex; gap: 15px; padding: 15px; background: #0a0a0a; border-radius: 8px; margin-bottom: 15px; border: 1px solid #333; }
        .cart-item img { width: 80px; height: 80px; object-fit: cover; border-radius: 5px; }
        .cart-item .info { flex: 1; }
        .cart-item h4 { color: #fff; margin-bottom: 5px; font-family: Georgia, serif; }
        .cart-item .price { color: #d4af37; font-weight: bold; }
        .cart-item .cat { color: #666; font-size: 12px; text-transform: uppercase; }
        .cart-item button { background: none; border: none; color: #666; cursor: pointer; font-size: 18px; }
        .cart-item button:hover { color: #dc3545; }
        .total-row { display: flex; justify-content: space-between; padding-top: 20px; border-top: 1px solid #333; font-size: 20px; font-weight: bold; }
        .total-row span:last-child { color: #d4af37; }
        .empty-cart { text-align: center; padding: 40px; color: #666; }
        .btn { display: block; width: 100%; padding: 15px; border-radius: 8px; text-align: center; text-decoration: none; font-weight: bold; margin-bottom: 15px; transition: all 0.3s; border: none; cursor: pointer; font-size: 16px; }
        .btn-whatsapp { background: #25d366; color: #fff; }
        .btn-whatsapp:hover { background: #128c7e; }
        .btn-phone { background: #007bff; color: #fff; }
        .btn-phone:hover { background: #0056b3; }
        .btn-gold { background: transparent; border: 2px solid #d4af37; color: #d4af37; }
        .btn-gold:hover { background: #d4af37; color: #000; }
        .note { text-align: center; color: #666; font-size: 12px; margin-top: 10px; }
        .review-item { background: #0a0a0a; padding: 20px; border-radius: 8px; margin-bottom: 15px; border-left: 3px solid #d4af37; }
        .review-item p { color: #ccc; font-style: italic; margin-bottom: 10px; }
        .review-item .author { color: #d4af37; font-weight: bold; font-size: 14px; }
        .review-item .date { color: #666; font-size: 12px; float: right; }
        .review-form { margin-top: 30px; padding-top: 30px; border-top: 1px solid #333; }
        .review-form h3 { color: #fff; margin-bottom: 15px; font-size: 16px; }
        .form-group { margin-bottom: 15px; }
        .form-group input, .form-group textarea { width: 100%; padding: 12px; background: #0a0a0a; border: 1px solid #333; border-radius: 5px; color: #fff; font-family: inherit; }
        .form-group input:focus, .form-group textarea:focus { outline: none; border-color: #d4af37; }
        .toast { position: fixed; bottom: 20px; right: 20px; background: #d4af37; color: #000; padding: 15px 30px; border-radius: 5px; font-weight: bold; transform: translateY(100px); opacity: 0; transition: all 0.3s; z-index: 3000; }
        .toast.show { transform: translateY(0); opacity: 1; }
        @media (max-width: 768px) { .two-col { grid-template-columns: 1fr; } .nav-links { display: none; } .mobile-menu-btn { display: block; } }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<nav>
    <div class="container nav-flex">
        <a href="index.html" class="logo">SUXY<span>Retail World</span></a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="order.html">Order</a>
            <a href="purchase.html" class="active">Purchase</a>
        </div>
        <button class="mobile-menu-btn" onclick="toggleMobileMenu()"><i class="fas fa-bars"></i></button>
    </div>
    <div id="mobileMenu" style="display: none; padding: 20px; background: #1a1a1a;">
        <a href="index.html" style="display: block; color: #ccc; padding: 10px 0;">Home</a>
        <a href="order.html" style="display: block; color: #ccc; padding: 10px 0;">Order</a>
        <a href="purchase.html" style="display: block; color: #d4af37; padding: 10px 0;">Purchase</a>
    </div>
</nav>

<main class="container">
    <h1 class="page-title">Review & Complete Purchase</h1>
    
    <div class="two-col">
        <div>
            <div class="box">
                <h2>Selected Items</h2>
                <div id="cartItems"></div>
                <div class="total-row" id="totalRow" style="display: none;">
                    <span>Total</span>
                    <span id="totalPrice">₦0</span>
                </div>
            </div>
            
            <div class="box" style="margin-top: 20px;">
                <h2>Complete Order</h2>
                <a id="waLink" href="#" target="_blank" class="btn btn-whatsapp"><i class="fab fa-whatsapp"></i> Purchase via WhatsApp</a>
                <a href="tel:+2347012305403" class="btn btn-phone"><i class="fas fa-phone"></i> Call Now</a>
                <p class="note">Pickup: Ekpoma/Benin | Waybill: Lagos</p>
            </div>
        </div>
        
        <div>
            <div class="box">
                <h2>Customer Reviews</h2>
                <div id="reviewsList" style="max-height: 300px; overflow-y: auto; padding-right: 10px;"></div>
                
                <div class="review-form">
                    <h3>Leave a Review</h3>
                    <form onsubmit="submitReview(event)">
                        <div class="form-group">
                            <input type="text" id="reviewName" placeholder="Your Name" required>
                        </div>
                        <div class="form-group">
                            <textarea id="reviewText" rows="3" placeholder="Share your experience..." required></textarea>
                        </div>
                        <button type="submit" class="btn btn-gold">Submit Review</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>

<div id="toast" class="toast">Notification</div>

<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig={apiKey:_0xf1[0],authDomain:_0xf1[1],projectId:_0xf1[2],storageBucket:_0xf1[3],messagingSenderId:_0xf1[4],appId:_0xf1[5]};

let db;
let cart = [];

document.addEventListener('DOMContentLoaded', () => {
    loadCart();
    
    try {
        firebase.initializeApp(firebaseConfig);
        db = firebase.firestore();
        loadReviews();
        db.collection('reviews').orderBy('timestamp', 'desc').onSnapshot(() => loadReviews());
    } catch (e) {
        console.error('Firebase error:', e);
    }
});

function loadCart() {
    cart = JSON.parse(localStorage.getItem('suxy_cart')) || [];
    renderCart();
}

function renderCart() {
    const container = document.getElementById('cartItems');
    const totalRow = document.getElementById('totalRow');
    const totalPrice = document.getElementById('totalPrice');
    const waLink = document.getElementById('waLink');
    
    if (cart.length === 0) {
        container.innerHTML = '<div class="empty-cart"><i class="fas fa-shopping-bag" style="font-size: 48px; color: #333; margin-bottom: 15px;"></i><p>Your cart is empty</p><a href="order.html" style="color: #d4af37; text-decoration: none;">Browse items</a></div>';
        totalRow.style.display = 'none';
        waLink.style.opacity = '0.5';
        waLink.style.pointerEvents = 'none';
        return;
    }
    
    waLink.style.opacity = '1';
    waLink.style.pointerEvents = 'auto';
    
    let total = 0;
    let message = "Hello SUXY Retail World,%0A%0AI want to buy:%0A";
    
    container.innerHTML = cart.map((item, idx) => {
        total += Number(item.price);
        message += `${idx + 1}. ${item.name} - ₦${item.price}%0A`;
        return `
            <div class="cart-item">
                <img src="${item.imageUrl}" alt="${item.name}">
                <div class="info">
                    <h4>${item.name}</h4>
                    <p class="price">₦${item.price}</p>
                    <p class="cat">${item.category}</p>
                </div>
                <button onclick="removeItem('${item.id}')"><i class="fas fa-trash"></i></button>
            </div>
        `;
    }).join('');
    
    totalPrice.textContent = '₦' + total.toLocaleString();
    totalRow.style.display = 'flex';
    
    message += `%0ATotal: ₦${total}%0A%0APlease send payment details.`;
    waLink.href = `https://wa.me/2347012305403?text=${message}`;
}

function removeItem(id) {
    cart = cart.filter(c => c.id !== id);
    localStorage.setItem('suxy_cart', JSON.stringify(cart));
    loadCart();
    showToast('Item removed');
}

async function loadReviews() {
    if (!db) return;
    try {
        const snapshot = await db.collection('reviews').orderBy('timestamp', 'desc').get();
        const reviews = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        
        const container = document.getElementById('reviewsList');
        if (reviews.length === 0) {
            container.innerHTML = '<p style="color: #666; font-style: italic;">No reviews yet. Be the first!</p>';
            return;
        }
        
        container.innerHTML = reviews.map(r => `
            <div class="review-item">
                <p>"${r.text}"</p>
                <span class="date">${r.timestamp ? new Date(r.timestamp.toDate()).toLocaleDateString() : ''}</span>
                <span class="author">- ${r.name}</span>
            </div>
        `).join('');
    } catch (e) {
        console.error('Reviews error:', e);
    }
}

async function submitReview(e) {
    e.preventDefault();
    if (!db) {
        showToast('Database not connected');
        return;
    }
    
    const name = document.getElementById('reviewName').value;
    const text = document.getElementById('reviewText').value;
    
    try {
        await db.collection('reviews').add({
            name,
            text,
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        });
        showToast('Review submitted!');
        document.getElementById('reviewName').value = '';
        document.getElementById('reviewText').value = '';
        loadReviews();
    } catch (err) {
        showToast('Error submitting review');
        console.error(err);
    }
}

function toggleMobileMenu() {
    const menu = document.getElementById('mobileMenu');
    menu.style.display = menu.style.display === 'none' ? 'block' : 'none';
}

function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3000);
}
</script>

</body>
</html>
